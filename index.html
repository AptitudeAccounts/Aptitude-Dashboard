<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Daily Sales Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F7F6F3;--surface:#FFFFFF;--border:#E8E6E0;--border2:#D4D1C8;--text:#1A1916;--muted:#7A7870;--hint:#B0AEA8;
  --blue:#2563EB;--blue-bg:#EFF4FF;--green:#16A34A;--green-bg:#F0FDF4;--amber:#D97706;--amber-bg:#FFFBEB;--red:#DC2626;--red-bg:#FEF2F2;--teal:#0D9488;--teal-bg:#F0FDFA;
  --r:10px;--r-sm:6px;--shadow:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04)
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}.mono{font-family:'DM Mono',monospace}
.app{max-width:1040px;margin:0 auto;padding:24px 16px 60px}.header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px}.header-left h1{font-size:22px;font-weight:600;letter-spacing:-.3px}.header-left p{font-size:13px;color:var(--muted);margin-top:2px}.date-chip{background:var(--surface);border:1px solid var(--border);border-radius:99px;padding:5px 14px;font-size:12px;color:var(--muted);font-weight:500}.top-tools{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.role-select,.mini-select{padding:7px 10px;border:1px solid var(--border);border-radius:8px;background:#fff;font:inherit;font-size:12px;color:var(--text)}
.nav{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:4px;margin-bottom:24px;box-shadow:var(--shadow);overflow-x:auto}.nav-btn{flex:1;min-width:108px;padding:7px 8px;border:none;border-radius:var(--r-sm);background:transparent;font-family:inherit;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap}.nav-btn.active{background:var(--text);color:#fff}.nav-btn:hover:not(.active){background:var(--bg);color:var(--text)}
.btabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}.btab{display:flex;align-items:center;gap:6px;padding:6px 14px;border:1px solid var(--border);border-radius:99px;background:var(--surface);font-family:inherit;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .15s;box-shadow:var(--shadow)}.btab.active{border-color:var(--text);color:var(--text);background:var(--surface)}.btab:hover:not(.active){border-color:var(--border2)}.bdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}.bcheck{font-size:10px;color:var(--green)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:16px;box-shadow:var(--shadow)}.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px;flex-wrap:wrap}.card-title{font-size:14px;font-weight:600}.card-sub{font-size:12px;color:var(--muted)}
.section-lbl{font-size:10px;font-weight:600;color:var(--hint);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;margin-top:16px}.section-lbl:first-child{margin-top:0}.grid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px}.grid-3{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px}.grid-4{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px}.fld{display:flex;flex-direction:column;gap:4px}.fld label{font-size:11px;font-weight:500;color:var(--muted)}.fld input,.fld select{padding:8px 10px;border:1px solid var(--border);border-radius:var(--r-sm);font-family:'DM Mono',monospace;font-size:13px;color:var(--text);background:var(--surface);outline:none;transition:border .15s}.fld input:focus,.fld select:focus{border-color:var(--blue)}.fld input:hover,.fld select:hover{border-color:var(--border2)}.fld input[disabled],.fld select[disabled]{background:var(--bg);color:var(--muted);cursor:not-allowed}.inline-filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}.inline-filters .fld{min-width:150px}.small-note{font-size:12px;color:var(--muted);margin-top:8px}
.calc-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:0;background:var(--bg);border:1px solid var(--border);border-radius:var(--r-sm);overflow:hidden;margin:12px 0}.ci{padding:10px 14px;border-right:1px solid var(--border)}.ci:last-child{border-right:none}.ci .cl{font-size:10px;font-weight:600;color:var(--hint);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}.ci .cv{font-size:15px;font-weight:600;font-family:'DM Mono',monospace;color:var(--text)}.ci .cv.blue{color:var(--blue)}.ci .cv.green{color:var(--green)}
.warn-box{background:var(--amber-bg);border:1px solid #FDE68A;border-radius:var(--r-sm);padding:8px 12px;font-size:12px;color:var(--amber);margin-top:10px;display:flex;align-items:center;gap:6px}.ok-box{background:var(--green-bg);border:1px solid #BBF7D0;border-radius:var(--r-sm);padding:8px 12px;font-size:12px;color:var(--green);margin-top:10px;display:flex;align-items:center;gap:6px}.danger-box{background:var(--red-bg);border:1px solid #FECACA;border-radius:var(--r-sm);padding:8px 12px;font-size:12px;color:var(--red);margin-bottom:14px}
.btn-row{display:flex;gap:8px;margin-top:16px}.btn{flex:1;padding:9px 16px;border-radius:var(--r-sm);font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--bg);color:var(--muted);transition:all .15s}.btn:hover{border-color:var(--border2);color:var(--text)}.btn.primary{background:var(--text);color:#fff;border-color:var(--text)}.btn.primary:hover{opacity:.88}.btn.report{background:var(--blue-bg);color:var(--blue);border-color:#BFDBFE;font-weight:600}.btn.report:hover{background:#DBEAFE}.btn.danger{background:var(--red-bg);color:var(--red);border-color:#FECACA}.btn:disabled{opacity:.55;cursor:not-allowed}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:16px}.metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;box-shadow:var(--shadow)}.metric .ml{font-size:11px;color:var(--muted);font-weight:500;margin-bottom:6px}.metric .mv{font-size:20px;font-weight:600;font-family:'DM Mono',monospace;letter-spacing:-.5px}.metric .ms{font-size:11px;color:var(--muted);margin-top:3px}.metric.blue .mv{color:var(--blue)}.metric.green .mv{color:var(--green)}.metric.amber .mv{color:var(--amber)}.metric.red .mv{color:var(--red)}
.tbl-wrap{overflow-x:auto;margin-top:4px}table{width:100%;border-collapse:collapse;font-size:12px}th{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;padding:8px 10px;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap;background:var(--bg)}td{padding:9px 10px;border-bottom:1px solid var(--border);color:var(--text);white-space:nowrap;font-family:'DM Mono',monospace;font-size:12px}tbody tr:last-child td{border-bottom:none}tfoot td{font-weight:600;background:var(--bg);border-top:1px solid var(--border2)}.outlet-name{font-family:'DM Sans',sans-serif;font-weight:500;display:flex;align-items:center;gap:6px}.pos{color:var(--green)}.neg{color:var(--red)}
.bar-section{margin-top:4px}.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}.bar-lbl{width:130px;font-size:12px;color:var(--muted);flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.bar-track{flex:1;background:var(--bg);border-radius:3px;height:8px;overflow:hidden;border:1px solid var(--border)}.bar-fill{height:100%;border-radius:2px;transition:width .4s cubic-bezier(.4,0,.2,1)}.bar-val{font-size:11px;font-weight:600;font-family:'DM Mono',monospace;color:var(--text);min-width:100px;text-align:right}
.hist-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);gap:12px}.hist-row:last-child{border-bottom:none}.hist-date{font-size:13px;font-weight:500}.hist-sub{font-size:11px;color:var(--muted);margin-top:1px}.hist-amt{text-align:right}.hist-amt .main{font-size:13px;font-weight:600;font-family:'DM Mono',monospace}.hist-amt .sub{font-size:11px;color:var(--blue);font-family:'DM Mono',monospace;margin-top:1px}.del-btn{background:none;border:none;color:var(--hint);cursor:pointer;padding:4px 6px;border-radius:4px;font-size:13px;line-height:1;transition:color .15s}.del-btn:hover{color:var(--red)}
.empty{text-align:center;padding:36px 20px;color:var(--hint);font-size:13px;border:1px dashed var(--border2);border-radius:var(--r)}.toast-wrap{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:999;pointer-events:none}.toast{background:var(--text);color:#fff;padding:9px 20px;border-radius:99px;font-size:13px;font-weight:500;opacity:0;transition:opacity .2s;white-space:nowrap;box-shadow:0 4px 12px rgba(0,0,0,.15)}.toast.show{opacity:1}.pay-mix{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.pay-pill{font-size:11px;padding:3px 10px;border-radius:99px;font-weight:500}.pay-pill.cash{background:var(--green-bg);color:var(--green)}.pay-pill.card{background:var(--blue-bg);color:var(--blue)}.pay-pill.bank{background:var(--teal-bg);color:var(--teal)}

.chart-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;margin-bottom:16px}.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;box-shadow:var(--shadow)}.chart-title{font-size:14px;font-weight:600;margin-bottom:4px}.chart-sub{font-size:12px;color:var(--muted);margin-bottom:14px}.donut-wrap{display:flex;align-items:center;gap:18px;flex-wrap:wrap}.donut{width:138px;height:138px;border-radius:50%;position:relative;flex:0 0 auto}.donut:after{content:'';position:absolute;inset:26px;background:var(--surface);border-radius:50%;border:1px solid var(--border)}.legend{display:flex;flex-direction:column;gap:8px;min-width:160px;flex:1}.legend-row{display:flex;align-items:center;justify-content:space-between;gap:12px;font-size:12px}.legend-left{display:flex;align-items:center;gap:7px;color:var(--muted)}.legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}.legend-val{font-family:'DM Mono',monospace;font-weight:600;color:var(--text)}.ratio-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:10px;margin-bottom:16px}.ratio-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:13px 14px;box-shadow:var(--shadow)}.ratio-card .rl{font-size:11px;color:var(--muted);font-weight:500;margin-bottom:5px}.ratio-card .rv{font-size:18px;font-weight:600;font-family:'DM Mono',monospace}.ratio-card .rs{font-size:11px;color:var(--muted);margin-top:2px}.trend{display:flex;align-items:flex-end;gap:5px;height:170px;padding:12px 4px 4px;border-left:1px solid var(--border);border-bottom:1px solid var(--border);overflow-x:auto}.trend-bar{min-width:16px;border-radius:4px 4px 0 0;position:relative}.trend-bar:hover:after{content:attr(data-tip);position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:var(--text);color:white;font-size:11px;white-space:nowrap;padding:4px 7px;border-radius:5px;margin-bottom:5px;z-index:2}.budget-bars{display:flex;flex-direction:column;gap:10px}.budget-bar-row{display:grid;grid-template-columns:130px 1fr 70px;gap:10px;align-items:center;font-size:12px}.progress-track{height:10px;border:1px solid var(--border);background:var(--bg);border-radius:99px;overflow:hidden}.progress-fill{height:100%;border-radius:99px;transition:width .3s}

@media(max-width:640px){.nav-btn{font-size:11px;padding:6px 8px}.metrics{grid-template-columns:1fr 1fr}.btn-row{flex-direction:column}.bar-lbl{width:105px}.app{padding-left:12px;padding-right:12px}}


.login-panel{position:fixed;inset:0;background:rgba(0,0,0,.35);display:none;align-items:center;justify-content:center;z-index:1000;padding:18px}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:0 12px 40px rgba(0,0,0,.18);width:min(420px,100%);padding:22px}
.login-card h2{font-size:18px;margin-bottom:6px}.login-card p{font-size:12px;color:var(--muted);margin-bottom:16px}.sync-chip{font-size:11px;color:var(--muted);background:var(--surface);border:1px solid var(--border);border-radius:99px;padding:5px 10px}

/* Print / PDF export */
.print-only{display:none}
@media print{
  @page{size:A4;margin:12mm}
  :root{--bg:#fff;--surface:#fff;--shadow:none}
  body{background:#fff;color:#111;font-size:11px}
  .app{max-width:none;padding:0}
  .top-tools,.nav,.btabs,.btn-row,.del-btn,button,label.btn,.danger-box input[type=file]{display:none!important}
  .header{border-bottom:2px solid #111;margin-bottom:14px;padding-bottom:10px}
  .header-left h1{font-size:20px}
  .header-left p{font-size:11px}
  .date-chip{border-color:#bbb;color:#333}
  .card,.metric,.chart-card{box-shadow:none;break-inside:avoid;border-color:#ccc}
  .metrics,.chart-grid{break-inside:avoid}
  .chart-grid{grid-template-columns:1fr 1fr}
  .tbl-wrap{overflow:visible}
  table{font-size:10px}
  th,td{padding:6px 7px}
  input,select{border:none!important;background:transparent!important;padding:0!important;color:#111!important}
  .print-only{display:block!important}
  .no-print{display:none!important}
}


/* Dedicated single-page Daily Sales Summary PDF */
#dailyPdfReport{display:none}
.report-page{font-family:'DM Sans',sans-serif;color:#111;background:#fff;padding:0}
.report-head{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid #111;padding-bottom:10px;margin-bottom:10px}
.report-title{font-size:22px;font-weight:700;letter-spacing:-.3px}
.report-meta{text-align:right;font-size:11px;color:#444;line-height:1.45}
.report-section-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin:12px 0 7px;color:#333}
.report-kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:7px;margin-bottom:10px}
.report-kpi{border:1px solid #ccc;border-radius:8px;padding:8px;background:#fafafa}
.report-kpi .label{font-size:9px;color:#666;text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
.report-kpi .value{font-family:'DM Mono',monospace;font-size:14px;font-weight:700}
.report-grid-2{display:grid;grid-template-columns:1.35fr .65fr;gap:10px;margin-top:8px}
.report-table{width:100%;border-collapse:collapse;font-size:10px}
.report-table th{background:#f3f3f3;color:#333;font-size:8px;text-transform:uppercase;letter-spacing:.04em;border:1px solid #d7d7d7;padding:5px;text-align:left}
.report-table td{border:1px solid #ddd;padding:5px;font-family:'DM Mono',monospace;white-space:nowrap}
.report-table td.name{font-family:'DM Sans',sans-serif;font-weight:600}
.report-table tfoot td{font-weight:700;background:#f7f7f7}
.report-ratios{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.report-ratio{border:1px solid #ddd;border-radius:7px;padding:7px;background:#fff}
.report-ratio .label{font-size:9px;color:#666;margin-bottom:2px}
.report-ratio .value{font-family:'DM Mono',monospace;font-weight:700;font-size:13px}
.report-bars{margin-top:8px}
.report-bar{display:grid;grid-template-columns:92px 1fr 74px;gap:6px;align-items:center;margin-bottom:5px;font-size:9px}
.report-track{height:8px;background:#eee;border:1px solid #ddd;border-radius:99px;overflow:hidden}
.report-fill{height:100%;border-radius:99px}
.report-foot{border-top:1px solid #ccc;margin-top:10px;padding-top:6px;font-size:9px;color:#666;display:flex;justify-content:space-between}
.report-visual-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px}
.report-mini-card{border:1px solid #ddd;border-radius:8px;padding:8px;background:#fff;min-height:128px}
.report-mini-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#555;margin-bottom:6px}
.report-donut-wrap{display:flex;align-items:center;gap:8px}
.report-donut{width:58px;height:58px;border-radius:50%;background:#eee;border:1px solid #ddd;flex-shrink:0}
.report-legend{display:flex;flex-direction:column;gap:3px;font-size:8px;color:#444;line-height:1.15}
.report-legend span{display:flex;align-items:center;gap:4px}
.report-swatch{width:7px;height:7px;border-radius:2px;display:inline-block;flex-shrink:0}
.report-mini-bars{display:flex;align-items:flex-end;gap:5px;height:72px;border-bottom:1px solid #ddd;padding-top:4px}
.report-mini-bar{flex:1;border-radius:3px 3px 0 0;min-height:2px;position:relative}
.report-mini-bar-label{font-size:7px;color:#555;text-align:center;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.report-mini-row{margin-bottom:6px}
.report-mini-row-top{display:flex;justify-content:space-between;font-size:8px;color:#555;margin-bottom:2px}
.report-mini-track{height:7px;background:#eee;border:1px solid #ddd;border-radius:99px;overflow:hidden}
.report-mini-fill{height:100%;border-radius:99px}
.report-big-number{font-family:'DM Mono',monospace;font-size:16px;font-weight:700;margin-top:8px}
.report-small-note{font-size:8px;color:#666;margin-top:3px;line-height:1.2}
@media print{
  body.print-daily-summary .app, body.print-daily-summary .toast-wrap{display:none!important}
  body.print-daily-summary #dailyPdfReport{display:block!important}
  body.print-daily-summary{background:#fff!important}
  @page{size:A4;margin:8mm}
  #dailyPdfReport{display:block!important}
  .report-page{break-inside:avoid;page-break-inside:avoid}
}

</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-left"><h1>Daily Sales Dashboard</h1><p>Aptitude &amp; Slice45 — All Branches</p></div>
    <div class="top-tools">
      <button class="btn" id="loginBtn" style="flex:0;padding:7px 12px" onclick="openLogin()">Admin Login</button>
      <button class="btn" id="logoutBtn" style="flex:0;padding:7px 12px;display:none" onclick="logoutAdmin()">Logout</button>
      <button class="btn primary" style="flex:0;padding:7px 12px" onclick="exportPDF()">Export PDF Report</button>
      <span id="dataBackupTools" style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn" style="flex:0;padding:7px 12px" onclick="downloadBackup()" title="For admin use: saves a copy of all dashboard data">Download Data Backup</button>
        <label class="btn" style="flex:0;padding:7px 12px;cursor:pointer" title="For admin use: restores dashboard data from a backup file">Restore Data Backup<input type="file" accept="application/json" style="display:none" onchange="restoreBackup(event)"></label>
      </span>
      <span class="date-chip" id="datechip"></span>
    </div>
  </div>

  <div class="nav">
    <button class="nav-btn" onclick="showView('entry')" id="nb-entry">Daily entry</button>
    <button class="nav-btn active" onclick="showView('summary')" id="nb-summary">Today's summary</button>
    <button class="nav-btn" onclick="showView('mtd')" id="nb-mtd">MTD tracker</button>
    <button class="nav-btn" onclick="showView('ytd')" id="nb-ytd">YTD</button>
    <button class="nav-btn" onclick="showView('history')" id="nb-history">History</button>
    <button class="nav-btn" onclick="showView('budget')" id="nb-budget">Branchwise budgeting</button>
  </div>

  <div class="print-only" id="printHeader" style="margin-bottom:14px">
    <div style="font-size:12px;color:#555">Generated report</div>
    <div style="font-size:18px;font-weight:600" id="printTitle">Management Report</div>
    <div style="font-size:11px;color:#555" id="printSubTitle"></div>
  </div>

  <div id="view-entry" style="display:none"></div>
  <div id="view-summary"></div>
  <div id="view-mtd" style="display:none"></div>
  <div id="view-ytd" style="display:none"></div>
  <div id="view-history" style="display:none"></div>
  <div id="view-budget" style="display:none"></div>
</div>
<div id="dailyPdfReport"></div>
<div class="login-panel" id="loginPanel">
  <div class="login-card">
    <h2>Admin Login</h2>
    <p>Only authorized admin users can enter, change, or delete dashboard records.</p>
    <div class="fld"><label>Username or email</label><input id="loginUser" autocomplete="username" placeholder="admin@example.com"></div>
    <div class="fld" style="margin-top:10px"><label>Password</label><input id="loginPass" type="password" autocomplete="current-password" placeholder="Password"></div>
    <div class="btn-row">
      <button class="btn" onclick="closeLogin()">Cancel</button>
      <button class="btn primary" onclick="loginAdmin()">Login</button>
    </div>
    <div class="small-note">Public visitors can view the dashboard. Editing is activated only after admin login.</div>
  </div>
</div>
<div class="toast-wrap"><div class="toast" id="toast"></div></div>

<script>
const STORAGE_VERSION=3;
const DEFAULT_BRANCHES=[
  {id:'al_qana',name:'Al Qana',color:'#2563EB',active:true},
  {id:'arc',name:'ARC',color:'#16A34A',active:true},
  {id:'dge',name:'DGE',color:'#D97706',active:true},
  {id:'louvre_kiosk',name:'Louvre Kiosk',color:'#9333EA',active:true},
  {id:'slice45_khalidya',name:'Slice45 Khalidya',color:'#0D9488',active:true}
];
const KEY='aptslice_dashboard_v3';
const OLD_KEY='aptslice_sales_v2';

/*
  GOOGLE SHEETS CONNECTION
  1) Deploy the Apps Script file I provided as a Web App.

const GOOGLE_SCRIPT_URL='https://script.google.com/macros/s/AKfycbwxQQw_rS86Ev1d8X2s9lghtQqfdg5qZDAAlCqu9a6gjobvBuzEaBNHJTskt8t7NyuURg/exec';
const AUTH_KEY='aptslice_admin_session_v1';
const blankEntry=()=>({gross:0,food:0,bev:0,retail:0,costOfSales:0,cash:0,visa:0,master:0,bank:0,discounts:0,covers:0,transactions:0,saved:false});
let db=loadDB();
let activeB=0,curView='summary',entryDate=today(),selectedMonth=today().substring(0,7),selectedYear=new Date().getFullYear(),role='viewer';

let syncTimer=null;

function sanitizeId(s){return String(s||'').toLowerCase().trim().replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'')||('branch_'+Date.now())}
function today(){return new Date().toISOString().split('T')[0]}
function todayLbl(){return new Date().toLocaleDateString('en-AE',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}
function dateLbl(d){return new Date(d+'T12:00:00').toLocaleDateString('en-AE',{weekday:'short',day:'numeric',month:'short',year:'numeric'})}
const fmt=n=>'AED '+Number(n||0).toLocaleString('en-AE',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtN=n=>Number(n||0).toLocaleString('en-AE',{minimumFractionDigits:2,maximumFractionDigits:2});
const pct=(a,b)=>b?((a/b)*100).toFixed(1)+'%':'—';
const branches=()=>db.branches.filter(b=>b.active!==false);
const branchById=id=>db.branches.find(b=>b.id===id)||{id,name:id,color:'#7A7870'};
const isViewer=()=>role==='viewer';
const isEditor=()=>role==='editor';

function loadDB(){
  try{const raw=localStorage.getItem(KEY);if(raw)return JSON.parse(raw)}catch(e){}
  const fresh={version:STORAGE_VERSION,branches:DEFAULT_BRANCHES,daily:{},budgets:{},role:'editor'};
  try{
    const old=localStorage.getItem(OLD_KEY);
    if(old){
      const h=JSON.parse(old);
      Object.keys(h).forEach(dt=>{fresh.daily[dt]={};Object.keys(h[dt]||{}).forEach(oldName=>{
        const br=DEFAULT_BRANCHES.find(x=>x.name===oldName); if(br)fresh.daily[dt][br.id]={...blankEntry(),...h[dt][oldName],saved:true};
      })});
    }
  }catch(e){}
  localStorage.setItem(KEY,JSON.stringify(fresh));
  return fresh;
}
function scriptConfigured(){return GOOGLE_SCRIPT_URL && !GOOGLE_SCRIPT_URL.includes('PASTE_YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL_HERE')}
function saveDB(){localStorage.setItem(KEY,JSON.stringify(db));queueCloudSync()}
function saveDBLocalOnly(){localStorage.setItem(KEY,JSON.stringify(db))}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
function loadAuth(){try{return JSON.parse(localStorage.getItem(AUTH_KEY)||'{}')}catch(e){return {}}}
function saveAuth(){localStorage.setItem(AUTH_KEY,JSON.stringify(auth||{}))}
function clearAuth(){auth={};localStorage.removeItem(AUTH_KEY)}
function openLogin(){document.getElementById('loginPanel').style.display='flex';setTimeout(()=>document.getElementById('loginUser').focus(),50)}
function closeLogin(){document.getElementById('loginPanel').style.display='none';document.getElementById('loginPass').value=''}
async function api(action,payload={}){
  if(!scriptConfigured())throw new Error('Google Sheet is not connected yet');
  const res=await fetch(GOOGLE_SCRIPT_URL,{method:'POST',body:JSON.stringify({action,token:auth.token||'',payload})});
  const data=await res.json();
  if(!data.ok)throw new Error(data.error||'Request failed');
  return data;
}
async function loginAdmin(){
  try{
    const username=document.getElementById('loginUser').value.trim();
    const password=document.getElementById('loginPass').value;
    if(!username||!password)return toast('Enter username and password');
    const data=await api('login',{username,password});
    auth={token:data.token,username:data.username,role:data.role,expiresAt:data.expiresAt};saveAuth();
    role='editor'; closeLogin();
    if(data.db){db=data.db;saveDBLocalOnly()}
    initSessionFromDate(); renderAll(); toast('Admin login successful ✓');
  }catch(e){toast('Login failed: '+e.message)}
}
function logoutAdmin(){clearAuth();role='viewer';renderAll();toast('Logged out. Editing is now locked.')}
async function refreshFromCloud(silent=false){
  if(!scriptConfigured()){cloudReady=false;updateModeUI();return}
  try{
    const data=await api('getPublicData',{});
    if(data.db){db=data.db;saveDBLocalOnly();cloudReady=true;initSessionFromDate();renderAll()}
    if(!silent)toast('Records loaded from Google Sheet ✓');
  }catch(e){cloudReady=false;updateModeUI();if(!silent)toast('Could not load Google Sheet data: '+e.message)}
}
async function validateSavedLogin(){
  if(!auth.token){role='viewer';return}
  try{
    const data=await api('validate',{});
    role=data.role==='admin'||data.role==='editor'?'editor':'viewer';
    if(data.db){db=data.db;saveDBLocalOnly()}
  }catch(e){clearAuth();role='viewer'}
}
function queueCloudSync(){
  if(!scriptConfigured()||isViewer()||!auth.token)return;
  clearTimeout(syncTimer);
  syncTimer=setTimeout(async()=>{
    try{await api('saveFullDB',{db});cloudReady=true;updateModeUI()}
    catch(e){toast('Google Sheet sync failed: '+e.message);cloudReady=false;updateModeUI()}
  },700);
}
function updateModeUI(){
  const tools=document.getElementById('dataBackupTools');if(tools)tools.style.display=isViewer()?'none':'flex';
  const lb=document.getElementById('loginBtn');if(lb)lb.style.display=isViewer()?'inline-block':'none';

function initSessionFromDate(){
  session={}; branches().forEach(b=>session[b.id]={...blankEntry(),...(db.daily[entryDate]?.[b.id]||{})});
  if(activeB>=branches().length)activeB=0;
}
function setEntryDate(v){entryDate=v||today();initSessionFromDate();renderEntry()}

function showView(v){curView=v;['entry','summary','mtd','ytd','history','budget'].forEach(id=>{document.getElementById('view-'+id).style.display=id===v?'block':'none';document.getElementById('nb-'+id).classList.toggle('active',id===v)});renderCurrent()}
function renderCurrent(){if(curView==='summary')renderSummary();else if(curView==='mtd')renderMTD();else if(curView==='ytd')renderYTD();else if(curView==='history')renderHistory();else if(curView==='budget')renderBudget();else renderEntry()}
function renderAll(){updateModeUI();renderCurrent()}
function switchB(i){activeB=i;renderEntry()}
function upd(bid,f,v){
  if(isViewer())return;
  const num=parseFloat(v)||0;
  session[bid][f]=num;
  if(f==='gross'){
    session[bid].costOfSales=round2(num*0.27);
    setValue('entry-cogs-input',session[bid].costOfSales?session[bid].costOfSales.toFixed(2):'');
  }
  updateLiveEntry(bid);
}
function round2(n){return Math.round((Number(n)||0)*100)/100}
function setText(id,value){const el=document.getElementById(id);if(el)el.textContent=value}
function setValue(id,value){const el=document.getElementById(id);if(el)el.value=value}
function updateLiveEntry(bid){
  const d=session[bid]; if(!d)return;
  const gross=d.gross||0, exV=gross/1.05, vatA=gross-exV;
  const payT=(d.cash||0)+(d.visa||0)+(d.master||0)+(d.bank||0);
  const diff=Math.abs(gross-payT);
  const payOk=gross===0||diff<0.05;
  const mixT=(d.food||0)+(d.bev||0)+(d.retail||0);
  const mixOk=mixT===0||Math.abs(exV-mixT)<0.5;
  const gp=exV-(d.costOfSales||0);
  setText('entry-exv',fmtN(exV));
  setText('entry-vat',fmtN(vatA));
  setText('entry-avg-cover',d.covers>0?fmtN(exV/d.covers):'—');
  setText('entry-avg-txn',d.transactions>0?fmtN(gross/d.transactions):'—');
  setValue('entry-gp',fmtN(gp));
  const mix=document.getElementById('entry-mix-status');
  if(mix){
    mix.innerHTML=(!mixOk&&gross>0)?`<div class="warn-box">⚠ Mix total (${fmtN(mixT)}) doesn't match ex-VAT sales (${fmtN(exV)})</div>`:'';
  }
  const pay=document.getElementById('entry-pay-status');
  if(pay){
    pay.innerHTML=!payOk?`<div class="warn-box">⚠ Payment total (${fmtN(payT)}) differs from gross by AED ${fmtN(diff)}</div>`:(gross>0?`<div class="ok-box">✓ Payments reconciled</div>`:'');
  }
}
function clearB(bid){
  if(isViewer())return;
  session[bid]=blankEntry();
  renderEntry();
  toast('Form cleared. Click Save if you want to update the stored record.');
}
function saveB(bid){
  if(isViewer())return toast('Editing is available after admin login');
  session[bid].saved=true;
  if(!db.daily[entryDate])db.daily[entryDate]={};
  db.daily[entryDate][bid]={...session[bid],saved:true,updatedAt:new Date().toISOString()};
  saveDB();toast(branchById(bid).name+' saved for '+entryDate+' ✓');renderEntry();
}
function delDay(d){if(isViewer())return toast('Editing is available after admin login');delete db.daily[d];saveDB();toast('Deleted '+d);renderHistory()}

function getDayData(d=today()){return db.daily[d]||{}}
function aggregate(days){
  const out={};
  branches().forEach(b=>out[b.id]={...blankEntry(),days:0});
  days.forEach(dt=>branches().forEach(b=>{
    const e=db.daily[dt]?.[b.id];
    if(e){['gross','food','bev','retail','costOfSales','cash','visa','master','bank','discounts','covers','transactions'].forEach(k=>out[b.id][k]+=(e[k]||0));if(e.gross>0)out[b.id].days++;}
  }));
  return out;
}
function totalsFromAgg(agg){const bs=branches();const t={gross:0,food:0,bev:0,retail:0,costOfSales:0,discounts:0,covers:0,transactions:0,cash:0,card:0,bank:0};bs.forEach(b=>{const m=agg[b.id]||{};t.gross+=m.gross||0;t.food+=m.food||0;t.bev+=m.bev||0;t.retail+=m.retail||0;t.costOfSales+=m.costOfSales||0;t.discounts+=m.discounts||0;t.covers+=m.covers||0;t.transactions+=m.transactions||0;t.cash+=m.cash||0;t.card+=(m.visa||0)+(m.master||0);t.bank+=m.bank||0});t.exv=t.gross/1.05;t.vat=t.gross-t.exv;t.grossProfit=t.exv-t.costOfSales;return t}
function reportFilters(type){
  const years=getYears();
  if(type==='month')return `<div class="inline-filters"><div class="fld"><label>Month</label><input type="month" value="${selectedMonth}" onchange="selectedMonth=this.value;renderCurrent()"></div></div>`;
  return `<div class="inline-filters"><div class="fld"><label>Year</label><select onchange="selectedYear=parseInt(this.value);renderCurrent()">${years.map(y=>`<option value="${y}" ${y===selectedYear?'selected':''}>${y}</option>`).join('')}</select></div></div>`;
}
function getYears(){const ys=new Set([new Date().getFullYear()]);Object.keys(db.daily).forEach(d=>ys.add(parseInt(d.substring(0,4))));Object.keys(db.budgets||{}).forEach(k=>ys.add(parseInt(k.substring(0,4))));return [...ys].filter(Boolean).sort((a,b)=>b-a)}
function ratio(n,d){return d?((n/d)*100).toFixed(1)+'%':'—'}
function renderMetricBlock(t,prefix,sub){return `<div class="metrics"><div class="metric"><div class="ml">${prefix} gross (incl. VAT)</div><div class="mv">${fmtN(t.gross)}</div><div class="ms">${sub||'AED'}</div></div><div class="metric blue"><div class="ml">${prefix} ex. VAT</div><div class="mv">${fmtN(t.exv)}</div></div><div class="metric amber"><div class="ml">${prefix} VAT</div><div class="mv">${fmtN(t.vat)}</div></div><div class="metric"><div class="ml">Cost of sales</div><div class="mv">${fmtN(t.costOfSales)}</div><div class="ms">COGS</div></div><div class="metric green"><div class="ml">Gross profit</div><div class="mv">${fmtN(t.grossProfit)}</div><div class="ms">Ex. VAT less COGS</div></div><div class="metric"><div class="ml">Covers / Transactions</div><div class="mv">${t.covers}</div><div class="ms">${t.transactions} transactions</div></div></div>`}
function renderRatioAnalysis(t,title='Ratio analysis'){
  const avgCover=t.covers?fmtN(t.exv/t.covers):'—',avgTxn=t.transactions?fmtN(t.gross/t.transactions):'—';
  return `<div class="card"><div class="card-header"><div><div class="card-title">${title}</div><div class="card-sub">Calculated automatically from saved Daily Entry data</div></div></div><div class="ratio-grid"><div class="ratio-card"><div class="rl">VAT / Gross</div><div class="rv">${ratio(t.vat,t.gross)}</div><div class="rs">VAT collected ratio</div></div><div class="ratio-card"><div class="rl">Discount / Gross</div><div class="rv">${ratio(t.discounts,t.gross)}</div><div class="rs">Discount pressure</div></div><div class="ratio-card"><div class="rl">COGS / Ex. VAT</div><div class="rv">${ratio(t.costOfSales,t.exv)}</div><div class="rs">Cost of sales ratio</div></div><div class="ratio-card"><div class="rl">Gross margin</div><div class="rv">${ratio(t.grossProfit,t.exv)}</div><div class="rs">After COGS</div></div><div class="ratio-card"><div class="rl">Average per cover</div><div class="rv">${avgCover}</div><div class="rs">Ex. VAT</div></div><div class="ratio-card"><div class="rl">Average transaction</div><div class="rv">${avgTxn}</div><div class="rs">Gross incl. VAT</div></div><div class="ratio-card"><div class="rl">Cash mix</div><div class="rv">${ratio(t.cash,t.gross)}</div><div class="rs">Cash / gross</div></div><div class="ratio-card"><div class="rl">Card mix</div><div class="rv">${ratio(t.card,t.gross)}</div><div class="rs">Visa + Mastercard</div></div></div></div>`;
}
function donutStyle(items){let total=items.reduce((s,x)=>s+x.value,0),pos=0;if(total<=0)return 'background:var(--bg)';const parts=items.map(x=>{const start=pos,end=pos+(x.value/total*360);pos=end;return `${x.color} ${start.toFixed(2)}deg ${end.toFixed(2)}deg`});return `background:conic-gradient(${parts.join(',')})`}
function renderDonutCard(title,items,sub=''){
  const total=items.reduce((s,x)=>s+x.value,0);const legend=items.map(x=>`<div class="legend-row"><div class="legend-left"><span class="legend-dot" style="background:${x.color}"></span>${x.label}</div><div class="legend-val">${fmtN(x.value)} <span style="color:var(--muted);font-weight:400">${ratio(x.value,total)}</span></div></div>`).join('');
  return `<div class="chart-card"><div class="chart-title">${title}</div>${sub?`<div class="chart-sub">${sub}</div>`:''}<div class="donut-wrap"><div class="donut" style="${donutStyle(items)}"></div><div class="legend">${legend||'<div class="empty">No data</div>'}</div></div></div>`;
}
function renderTrendChart(days,title){
  const vals=days.map(d=>({date:d,value:branches().reduce((s,b)=>s+(db.daily[d]?.[b.id]?.gross||0),0)})).filter(x=>x.value>0);const max=Math.max(...vals.map(x=>x.value),0);
  const bars=vals.map(x=>`<div class="trend-bar" data-tip="${dateLbl(x.date)}: ${fmt(x.value)}" style="height:${max?(x.value/max*100).toFixed(1):0}%;background:var(--blue)"></div>`).join('')||'<div class="empty">No trend data</div>';
  return `<div class="chart-card"><div class="chart-title">${title}</div><div class="chart-sub">Daily gross sales trend</div><div class="trend">${bars}</div></div>`;
}
function renderReportCharts(agg,t,days,title){
  return `<div class="chart-grid">${renderDonutCard('Revenue mix',[{label:'Food',value:t.food,color:'var(--blue)'},{label:'Beverage',value:t.bev,color:'var(--green)'},{label:'Retail',value:t.retail,color:'var(--amber)'}],'Ex. VAT sales split')}${renderDonutCard('Payment mix',[{label:'Cash',value:t.cash,color:'var(--green)'},{label:'Cards',value:t.card,color:'var(--blue)'},{label:'Bank transfer',value:t.bank,color:'var(--teal)'}],'Gross payment split')}${renderTrendChart(days,title+' trend')}</div>`;
}

function daysInMonth(monthKey){const [y,m]=monthKey.split('-').map(Number);return new Date(y,m,0).getDate()}
function renderBudgetTrend(monthKey,totalSalesBudget,totalCostBudget){
  const dim=daysInMonth(monthKey), dailySalesTarget=totalSalesBudget/dim, dailyCostTarget=totalCostBudget/dim;
  const pts=[];let salesCum=0,costCum=0;
  for(let i=1;i<=dim;i++){
    const d=monthKey+'-'+String(i).padStart(2,'0');
    branches().forEach(b=>{const e=db.daily[d]?.[b.id];if(e){salesCum+=(e.gross||0);costCum+=(e.costOfSales||0)}});
    pts.push({day:i,sales:salesCum,salesTarget:dailySalesTarget*i,cost:costCum,costTarget:dailyCostTarget*i});
  }
  const w=680,h=240,pad=34;
  const maxVal=Math.max(1,totalSalesBudget,totalCostBudget,...pts.flatMap(p=>[p.sales,p.salesTarget,p.cost,p.costTarget]));
  const x=d=>pad+(d-1)*((w-pad*2)/(Math.max(dim-1,1)));
  const y=v=>h-pad-(v/maxVal)*(h-pad*2);
  const poly=(arr,key)=>arr.map(p=>`${x(p.day).toFixed(1)},${y(p[key]).toFixed(1)}`).join(' ');
  const last=pts[pts.length-1]||{sales:0,cost:0,salesTarget:0,costTarget:0};
  return `<div class="chart-card"><div class="chart-title">Monthly budget trend</div><div class="chart-sub">Cumulative actuals vs prorated monthly budget</div><svg viewBox="0 0 ${w} ${h}" style="width:100%;height:260px;overflow:visible"><line x1="${pad}" y1="${h-pad}" x2="${w-pad}" y2="${h-pad}" stroke="#E8E6E0"/><line x1="${pad}" y1="${pad}" x2="${pad}" y2="${h-pad}" stroke="#E8E6E0"/><polyline points="${poly(pts,'salesTarget')}" fill="none" stroke="#93C5FD" stroke-width="2" stroke-dasharray="6 5"/><polyline points="${poly(pts,'sales')}" fill="none" stroke="#2563EB" stroke-width="3"/><polyline points="${poly(pts,'costTarget')}" fill="none" stroke="#FCA5A5" stroke-width="2" stroke-dasharray="6 5"/><polyline points="${poly(pts,'cost')}" fill="none" stroke="#DC2626" stroke-width="3"/><text x="${pad}" y="18" font-size="11" fill="#7A7870">AED ${Math.round(maxVal).toLocaleString('en-AE')}</text><text x="${pad}" y="${h-8}" font-size="11" fill="#7A7870">Day 1</text><text x="${w-pad-40}" y="${h-8}" font-size="11" fill="#7A7870">Day ${dim}</text></svg><div class="pay-mix"><span class="pay-pill card">Sales actual: ${fmt(last.sales)}</span><span class="pay-pill card">Sales budget line: ${fmt(last.salesTarget)}</span><span class="pay-pill cash">Cost actual: ${fmt(last.cost)}</span><span class="pay-pill cash">Cost budget line: ${fmt(last.costTarget)}</span></div></div>`;
}
function renderBudgetWaterfall(totalSalesBudget,actualSales,totalCostBudget,actualCost){
  const salesVar=actualSales-totalSalesBudget,costVar=actualCost-totalCostBudget;
  const steps=[
    {label:'Sales Budget',value:totalSalesBudget,type:'base'},
    {label:'Sales Variance',value:salesVar,type:salesVar>=0?'up':'down'},
    {label:'Actual Sales',value:actualSales,type:'total'},
    {label:'Cost Budget',value:totalCostBudget,type:'base'},
    {label:'Cost Variance',value:costVar,type:costVar<=0?'up':'down'},
    {label:'Actual Cost',value:actualCost,type:'total'}
  ];
  const maxVal=Math.max(1,...steps.map(s=>Math.abs(s.value)),totalSalesBudget,actualSales,totalCostBudget,actualCost);
  const bars=steps.map(s=>{const pct=Math.max(3,Math.min(100,Math.abs(s.value)/maxVal*100));const color=s.type==='up'?'var(--green)':s.type==='down'?'var(--red)':s.type==='total'?'var(--text)':'var(--blue)';return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:9px"><div style="width:105px;font-size:12px;color:var(--muted)">${s.label}</div><div style="flex:1;height:18px;background:var(--bg);border:1px solid var(--border);border-radius:5px;overflow:hidden"><div style="height:100%;width:${pct}%;background:${color}"></div></div><div class="mono" style="width:110px;text-align:right;font-size:12px">${fmt(s.value)}</div></div>`}).join('');
  return `<div class="chart-card"><div class="chart-title">Variance waterfall</div><div class="chart-sub">Shows how budget moves to actual for sales and cost</div>${bars}<div class="small-note">Green is favorable. Red is unfavorable. For cost, spending below budget is favorable.</div></div>`;
}

        <div class="report-section-title">Ratio analysis</div>
        <div class="report-ratios">
          <div class="report-ratio"><div class="label">VAT / Gross</div><div class="value">${ratio(t.vat,t.gross)}</div></div>
          <div class="report-ratio"><div class="label">Discount / Gross</div><div class="value">${ratio(t.discounts,t.gross)}</div></div>
          <div class="report-ratio"><div class="label">COGS / Ex. VAT</div><div class="value">${ratio(t.costOfSales,t.exv)}</div></div>
          <div class="report-ratio"><div class="label">Gross margin</div><div class="value">${ratio(t.grossProfit,t.exv)}</div></div>
          <div class="report-ratio"><div class="label">Avg / cover</div><div class="value">${t.covers?fmtN(t.exv/t.covers):'—'}</div></div>
          <div class="report-ratio"><div class="label">Avg / transaction</div><div class="value">${t.transactions?fmtN(t.gross/t.transactions):'—'}</div></div>
          <div class="report-ratio"><div class="label">Cash mix</div><div class="value">${ratio(totalCash,payTotal)}</div></div>
          <div class="report-ratio"><div class="label">Card mix</div><div class="value">${ratio(totalCard,payTotal)}</div></div>
        </div>
        <div class="report-section-title">Payment summary</div>
        <table class="report-table"><tbody><tr><td class="name">Cash</td><td>${fmtN(totalCash)}</td><td>${ratio(totalCash,payTotal)}</td></tr><tr><td class="name">Cards</td><td>${fmtN(totalCard)}</td><td>${ratio(totalCard,payTotal)}</td></tr><tr><td class="name">Bank transfer</td><td>${fmtN(totalBank)}</td><td>${ratio(totalBank,payTotal)}</td></tr><tr><td class="name"><b>Total received</b></td><td><b>${fmtN(payTotal)}</b></td><td>${ratio(payTotal,t.gross)}</td></tr></tbody></table>
      </div>
    </div>
    <div class="report-section-title">Management visuals</div>
    <div class="report-visual-grid">
      <div class="report-mini-card"><div class="report-mini-title">Revenue mix</div><div class="report-donut-wrap"><div class="report-donut" style="background:conic-gradient(#2563EB 0 ${revFood}%, #16A34A ${revFood}% ${revFood+revBev}%, #D97706 ${revFood+revBev}% 100%)"></div><div class="report-legend"><span><i class="report-swatch" style="background:#2563EB"></i>Food ${revFood.toFixed(1)}%</span><span><i class="report-swatch" style="background:#16A34A"></i>Beverage ${revBev.toFixed(1)}%</span><span><i class="report-swatch" style="background:#D97706"></i>Retail ${revRetail.toFixed(1)}%</span></div></div><div class="report-small-note">Based on ex-VAT revenue mix entered by branch.</div></div>
      <div class="report-mini-card"><div class="report-mini-title">Payment mix</div><div class="report-donut-wrap"><div class="report-donut" style="background:conic-gradient(#16A34A 0 ${payCash}%, #2563EB ${payCash}% ${payCash+payCard}%, #0D9488 ${payCash+payCard}% 100%)"></div><div class="report-legend"><span><i class="report-swatch" style="background:#16A34A"></i>Cash ${payCash.toFixed(1)}%</span><span><i class="report-swatch" style="background:#2563EB"></i>Cards ${payCard.toFixed(1)}%</span><span><i class="report-swatch" style="background:#0D9488"></i>Bank ${payBank.toFixed(1)}%</span></div></div><div class="report-small-note">Compares received payment methods against total received.</div></div>
      <div class="report-mini-card"><div class="report-mini-title">Top branch sales</div><div class="report-mini-bars">${branchMini}</div><div class="report-small-note">Relative gross sales ranking for the selected report date.</div></div>
      <div class="report-mini-card"><div class="report-mini-title">Margin dashboard</div><div class="report-mini-row"><div class="report-mini-row-top"><span>Gross margin</span><b>${gpPct.toFixed(1)}%</b></div><div class="report-mini-track"><div class="report-mini-fill" style="width:${Math.min(gpPct,100)}%;background:#16A34A"></div></div></div><div class="report-mini-row"><div class="report-mini-row-top"><span>COGS / sales</span><b>${cogsPct.toFixed(1)}%</b></div><div class="report-mini-track"><div class="report-mini-fill" style="width:${Math.min(cogsPct,100)}%;background:#D97706"></div></div></div><div class="report-mini-row"><div class="report-mini-row-top"><span>Discount / gross</span><b>${discPct.toFixed(1)}%</b></div><div class="report-mini-track"><div class="report-mini-fill" style="width:${Math.min(discPct,100)}%;background:#DC2626"></div></div></div><div class="report-small-note">Compact ratio view for quick management review.</div></div>
    </div>
    <div class="report-foot"><span>Prepared from Daily Entry records only.</span><span>Single-page management report</span></div>
  </div>`;
}
function exportPDF(){
  const reportDate=(curView==='entry'?entryDate:today());
  const target=document.getElementById('dailyPdfReport');
  target.innerHTML=buildDailySummaryReport(reportDate);
  document.body.classList.add('print-daily-summary');
  const cleanup=()=>document.body.classList.remove('print-daily-summary');
  window.onafterprint=cleanup;
  setTimeout(()=>window.print(),80);
  setTimeout(cleanup,1200);
}
function downloadBackup(){if(isViewer())return toast('Editing is available after admin login');const blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download='aptitude-dashboard-data-backup-'+today()+'.json';a.click();URL.revokeObjectURL(url);toast('Data backup downloaded ✓')}
function restoreBackup(ev){if(isViewer()){ev.target.value='';return toast('Editing is available after admin login')}const file=ev.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=()=>{try{const imported=JSON.parse(reader.result);if(!imported.daily||!imported.branches)throw new Error('Invalid file');db=imported;role=auth.token?'editor':'viewer';saveDB();initSessionFromDate();renderAll();toast('Data backup restored ✓')}catch(e){toast('Restore failed: please choose a valid backup file')}};reader.readAsText(file);ev.target.value=''}

document.getElementById('datechip').textContent=todayLbl();
(async function startDashboard(){
  initSessionFromDate();updateModeUI();renderSummary();
  await validateSavedLogin();
  if(scriptConfigured()) await refreshFromCloud(true);
  initSessionFromDate();renderAll();
})();
</script>
</body>
</html>
