<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Daily Sales Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F7F6F3;--surface:#FFFFFF;--border:#E8E6E0;--border2:#D4D1C8;--text:#1A1916;--muted:#7A7870;--hint:#B0AEA8;
  --blue:#2563EB;--blue-bg:#EFF4FF;--green:#16A34A;--green-bg:#F0FDF4;--amber:#D97706;--amber-bg:#FFFBEB;--red:#DC2626;--red-bg:#FEF2F2;--teal:#0D9488;--teal-bg:#F0FDFA;
  --r:10px;--r-sm:6px;--shadow:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04)
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}.mono{font-family:'DM Mono',monospace}
.app{max-width:1440px;margin:0 auto;padding:24px 24px 60px}.header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px}.header-left h1{font-size:22px;font-weight:600;letter-spacing:-.3px}.header-left p{font-size:13px;color:var(--muted);margin-top:2px}.date-chip{background:var(--surface);border:1px solid var(--border);border-radius:99px;padding:5px 14px;font-size:12px;color:var(--muted);font-weight:500}.top-tools{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.role-select,.mini-select{padding:7px 10px;border:1px solid var(--border);border-radius:8px;background:#fff;font:inherit;font-size:12px;color:var(--text)}
.nav{display:flex;flex-wrap:wrap;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:4px;margin-bottom:24px;box-shadow:var(--shadow)}.nav-btn{flex:1 1 120px;min-width:120px;padding:8px 8px;border:none;border-radius:var(--r-sm);background:transparent;font-family:inherit;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.nav-btn.active{background:var(--text);color:#fff}.nav-btn:hover:not(.active){background:var(--bg);color:var(--text)}
.btabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}.btab{display:flex;align-items:center;gap:6px;padding:6px 14px;border:1px solid var(--border);border-radius:99px;background:var(--surface);font-family:inherit;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .15s;box-shadow:var(--shadow)}.btab.active{border-color:var(--text);color:var(--text);background:var(--surface)}.btab:hover:not(.active){border-color:var(--border2)}.bdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}.bcheck{font-size:10px;color:var(--green)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:16px;box-shadow:var(--shadow)}.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px;flex-wrap:wrap}.card-title{font-size:14px;font-weight:600}.card-sub{font-size:12px;color:var(--muted)}
.section-lbl{font-size:10px;font-weight:600;color:var(--hint);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;margin-top:16px}.section-lbl:first-child{margin-top:0}.grid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px}.grid-3{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px}.grid-4{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px}.grid-5{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px}.channel-line{display:grid;grid-template-columns:150px repeat(2,minmax(120px,1fr));gap:10px;align-items:end;margin-bottom:10px}.channel-title{font-size:12px;font-weight:600;color:var(--text);padding-top:22px}@media(max-width:640px){.channel-line{grid-template-columns:1fr}.channel-title{padding-top:0}}.fld{display:flex;flex-direction:column;gap:4px}.fld label{font-size:11px;font-weight:500;color:var(--muted)}.fld input,.fld select{padding:8px 10px;border:1px solid var(--border);border-radius:var(--r-sm);font-family:'DM Mono',monospace;font-size:13px;color:var(--text);background:var(--surface);Qlub:none;transition:border .15s}.fld input:focus,.fld select:focus{border-color:var(--blue)}.fld input:hover,.fld select:hover{border-color:var(--border2)}.fld input[disabled],.fld select[disabled]{background:var(--bg);color:var(--muted);cursor:not-allowed}.inline-filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}.inline-filters .fld{min-width:150px}.small-note{font-size:12px;color:var(--muted);margin-top:8px}
.calc-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:0;background:var(--bg);border:1px solid var(--border);border-radius:var(--r-sm);overflow:hidden;margin:12px 0}.ci{padding:10px 14px;border-right:1px solid var(--border)}.ci:last-child{border-right:none}.ci .cl{font-size:10px;font-weight:600;color:var(--hint);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}.ci .cv{font-size:15px;font-weight:600;font-family:'DM Mono',monospace;color:var(--text)}.ci .cv.blue{color:var(--blue)}.ci .cv.green{color:var(--green)}
.warn-box{background:var(--amber-bg);border:1px solid #FDE68A;border-radius:var(--r-sm);padding:8px 12px;font-size:12px;color:var(--amber);margin-top:10px;display:flex;align-items:center;gap:6px}.ok-box{background:var(--green-bg);border:1px solid #BBF7D0;border-radius:var(--r-sm);padding:8px 12px;font-size:12px;color:var(--green);margin-top:10px;display:flex;align-items:center;gap:6px}.danger-box{background:var(--red-bg);border:1px solid #FECACA;border-radius:var(--r-sm);padding:8px 12px;font-size:12px;color:var(--red);margin-bottom:14px}
.btn-row{display:flex;gap:8px;margin-top:16px}.btn{flex:1;padding:9px 16px;border-radius:var(--r-sm);font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--bg);color:var(--muted);transition:all .15s}.btn:hover{border-color:var(--border2);color:var(--text)}.btn.primary{background:var(--text);color:#fff;border-color:var(--text)}.btn.primary:hover{opacity:.88}.btn.report{background:var(--blue-bg);color:var(--blue);border-color:#BFDBFE;font-weight:600}.btn.report:hover{background:#DBEAFE}.btn.danger{background:var(--red-bg);color:var(--red);border-color:#FECACA}.btn:disabled{opacity:.55;cursor:not-allowed}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:16px}.metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;box-shadow:var(--shadow)}.metric .ml{font-size:11px;color:var(--muted);font-weight:500;margin-bottom:6px}.metric .mv{font-size:20px;font-weight:600;font-family:'DM Mono',monospace;letter-spacing:-.5px}.metric .ms{font-size:11px;color:var(--muted);margin-top:3px}.metric.blue .mv{color:var(--blue)}.metric.green .mv{color:var(--green)}.metric.amber .mv{color:var(--amber)}.metric.red .mv{color:var(--red)}
.tbl-wrap{overflow-x:auto;margin-top:4px}table{width:100%;border-collapse:collapse;font-size:12px}th{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;padding:8px 10px;border-bottom:1px solid var(--border);text-align:center;white-space:nowrap;background:var(--bg)}td{padding:9px 10px;border-bottom:1px solid var(--border);color:var(--text);white-space:nowrap;font-family:'DM Mono',monospace;font-size:12px;text-align:right}td:first-child,th:first-child{text-align:left}tbody tr:last-child td{border-bottom:none}tfoot td{font-weight:600;background:var(--bg);border-top:1px solid var(--border2)}.outlet-name{font-family:'DM Sans',sans-serif;font-weight:500;display:flex;align-items:center;gap:6px}.pos{color:var(--green)}.neg{color:var(--red)}
.bar-section{margin-top:4px}.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}.bar-lbl{width:130px;font-size:12px;color:var(--muted);flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.bar-track{flex:1;background:var(--bg);border-radius:3px;height:8px;overflow:hidden;border:1px solid var(--border)}.bar-fill{height:100%;border-radius:2px;transition:width .4s cubic-bezier(.4,0,.2,1)}.bar-val{font-size:11px;font-weight:600;font-family:'DM Mono',monospace;color:var(--text);min-width:100px;text-align:right}
.hist-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);gap:12px}.hist-row:last-child{border-bottom:none}.hist-date{font-size:13px;font-weight:500}.hist-sub{font-size:11px;color:var(--muted);margin-top:1px}.hist-amt{text-align:right}.hist-amt .main{font-size:13px;font-weight:600;font-family:'DM Mono',monospace}.hist-amt .sub{font-size:11px;color:var(--blue);font-family:'DM Mono',monospace;margin-top:1px}.del-btn{background:none;border:none;color:var(--hint);cursor:pointer;padding:4px 6px;border-radius:4px;font-size:13px;line-height:1;transition:color .15s}.del-btn:hover{color:var(--red)}
.empty{text-align:center;padding:36px 20px;color:var(--hint);font-size:13px;border:1px dashed var(--border2);border-radius:var(--r)}.toast-wrap{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:999;pointer-events:none}.toast{background:var(--text);color:#fff;padding:9px 20px;border-radius:99px;font-size:13px;font-weight:500;opacity:0;transition:opacity .2s;white-space:nowrap;box-shadow:0 4px 12px rgba(0,0,0,.15)}.toast.show{opacity:1}.pay-mix{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.pay-pill{font-size:11px;padding:3px 10px;border-radius:99px;font-weight:500}.pay-pill.cash{background:var(--green-bg);color:var(--green)}.pay-pill.card{background:var(--blue-bg);color:var(--blue)}.pay-pill.bank{background:var(--teal-bg);color:var(--teal)}

.chart-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;margin-bottom:16px}.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;box-shadow:var(--shadow)}.chart-title{font-size:14px;font-weight:600;margin-bottom:4px}.chart-sub{font-size:12px;color:var(--muted);margin-bottom:14px}.donut-wrap{display:flex;align-items:center;gap:18px;flex-wrap:wrap}.donut{width:138px;height:138px;border-radius:50%;position:relative;flex:0 0 auto}.donut:after{content:'';position:absolute;inset:26px;background:var(--surface);border-radius:50%;border:1px solid var(--border)}.legend{display:flex;flex-direction:column;gap:8px;min-width:160px;flex:1}.legend-row{display:flex;align-items:center;justify-content:space-between;gap:12px;font-size:12px}.legend-left{display:flex;align-items:center;gap:7px;color:var(--muted)}.legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}.legend-val{font-family:'DM Mono',monospace;font-weight:600;color:var(--text)}.ratio-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:10px;margin-bottom:16px}.ratio-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:13px 14px;box-shadow:var(--shadow)}.ratio-card .rl{font-size:11px;color:var(--muted);font-weight:500;margin-bottom:5px}.ratio-card .rv{font-size:18px;font-weight:600;font-family:'DM Mono',monospace}.ratio-card .rs{font-size:11px;color:var(--muted);margin-top:2px}.trend{display:flex;align-items:flex-end;gap:5px;height:170px;padding:12px 4px 4px;border-left:1px solid var(--border);border-bottom:1px solid var(--border);overflow-x:auto}.trend-bar{min-width:16px;border-radius:4px 4px 0 0;position:relative}.trend-bar:hover:after{content:attr(data-tip);position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:var(--text);color:white;font-size:11px;white-space:nowrap;padding:4px 7px;border-radius:5px;margin-bottom:5px;z-index:2}.budget-bars{display:flex;flex-direction:column;gap:10px}.budget-bar-row{display:grid;grid-template-columns:130px 1fr 70px;gap:10px;align-items:center;font-size:12px}.progress-track{height:10px;border:1px solid var(--border);background:var(--bg);border-radius:99px;overflow:hidden}.progress-fill{height:100%;border-radius:99px;transition:width .3s}

@media(max-width:640px){.nav-btn{font-size:11px;padding:6px 8px}.metrics{grid-template-columns:1fr 1fr}.btn-row{flex-direction:column}.bar-lbl{width:105px}.app{padding-left:12px;padding-right:12px}}


.login-panel{position:fixed;inset:0;background:rgba(0,0,0,.35);display:none;align-items:center;justify-content:center;z-index:1000;padding:18px}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:0 12px 40px rgba(0,0,0,.18);width:min(420px,100%);padding:22px}
.login-card h2{font-size:18px;margin-bottom:6px}.login-card p{font-size:12px;color:var(--muted);margin-bottom:16px}.sync-chip{font-size:11px;color:var(--muted);background:var(--surface);border:1px solid var(--border);border-radius:99px;padding:5px 10px}

/* Print / PDF export */
.print-only{display:none}
html{-webkit-print-color-adjust:exact;print-color-adjust:exact;color-adjust:exact}
@media print{
  @page{size:A4;margin:12mm}
  :root{--bg:#fff;--surface:#fff;--shadow:none}
  body{background:#fff;color:#111;font-size:11px;-webkit-print-color-adjust:exact;print-color-adjust:exact;color-adjust:exact}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;color-adjust:exact!important}
  .app{max-width:none;padding:0}
  .top-tools,.nav,.btabs,.btn-row,.del-btn,button,label.btn,.danger-box input[type=file]{display:none!important}
  .header{border-bottom:2px solid #111;margin-bottom:14px;padding-bottom:10px}
  .header-left h1{font-size:20px}
  .header-left p{font-size:11px}
  .date-chip{border-color:#bbb;color:#333}
  .card,.metric,.chart-card{box-shadow:none;break-inside:avoid;border-color:#ccc}
  .metrics,.chart-grid{break-inside:avoid}
  .chart-grid{grid-template-columns:1fr 1fr}
  .tbl-wrap{overflow:visible}
  table{font-size:10px}
  th,td{padding:6px 7px}
  input,select{border:none!important;background:transparent!important;padding:0!important;color:#111!important}
  .print-only{display:block!important}
  .no-print{display:none!important}
}


/* Dedicated colorful Daily Sales Summary PDF */
#dailyPdfReport{display:none}
.report-page{font-family:'DM Sans',sans-serif;color:#12213A;background:#fff;padding:0;page-break-after:always;break-after:page;min-height:276mm}
.report-page:last-child{page-break-after:auto;break-after:auto}
.report-head{display:flex;justify-content:space-between;align-items:flex-start;background:linear-gradient(135deg,#0F172A,#2563EB);color:#fff;border-radius:14px;padding:16px 18px;margin-bottom:12px}
.report-title{font-size:25px;font-weight:800;letter-spacing:-.4px}
.report-meta{text-align:right;font-size:11px;color:#E0ECFF;line-height:1.55}
.report-section-title{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;margin:12px 0 8px;color:#1E3A8A}
.report-kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
.report-kpi{border:1px solid #BFDBFE;border-radius:12px;padding:11px;background:linear-gradient(180deg,#EFF6FF,#FFFFFF)}
.report-kpi.green{border-color:#BBF7D0;background:linear-gradient(180deg,#F0FDF4,#FFFFFF)}.report-kpi.amber{border-color:#FDE68A;background:linear-gradient(180deg,#FFFBEB,#FFFFFF)}.report-kpi.red{border-color:#FECACA;background:linear-gradient(180deg,#FEF2F2,#FFFFFF)}
.report-kpi .label{font-size:9px;color:#475569;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;font-weight:700}
.report-kpi .value{font-family:'DM Mono',monospace;font-size:18px;font-weight:800;color:#0F172A}
.report-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px}
.report-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:8px}
.report-card{border:1px solid #D6E4FF;border-radius:14px;background:#fff;padding:12px;box-shadow:0 6px 18px rgba(37,99,235,.08)}
.report-table{width:100%;border-collapse:separate;border-spacing:0;font-size:9.3px;overflow:hidden;border-radius:10px;border:1px solid #D6E4FF}
.report-table th{background:#1D4ED8;color:#fff;font-size:7.5px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;border:1px solid #2B60D9;padding:6px 5px;text-align:center;vertical-align:middle}
.report-table td{border:1px solid #E2E8F0;padding:5px;font-family:'DM Mono',monospace;white-space:nowrap;background:#fff;color:#0F172A;text-align:right}
.report-table tbody tr:nth-child(even) td{background:#F8FAFC}.report-table td.name{font-family:'DM Sans',sans-serif;font-weight:700;text-align:left}.report-table tfoot td{font-weight:800;background:#DBEAFE;color:#0F172A}.report-table tfoot td.name{text-align:left}
.report-ratios{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.report-ratio{border:1px solid #C7D2FE;border-radius:10px;padding:9px;background:#F8FAFF}.report-ratio .label{font-size:9px;color:#475569;margin-bottom:3px}.report-ratio .value{font-family:'DM Mono',monospace;font-weight:800;font-size:15px;color:#1D4ED8}
.report-bars{margin-top:8px}.report-bar{display:grid;grid-template-columns:105px 1fr 82px;gap:7px;align-items:center;margin-bottom:7px;font-size:9px}.report-bar div:last-child{text-align:right;font-family:'DM Mono',monospace}.report-track{height:13px;background:#E5E7EB;border-radius:99px;overflow:hidden}.report-fill{height:100%;border-radius:99px}
.report-visual-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:10px}.report-mini-card{border:1px solid #D6E4FF;border-radius:14px;padding:12px;background:#fff;min-height:180px}.report-mini-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:#1E3A8A;margin-bottom:8px}.report-donut-wrap{display:flex;align-items:center;gap:14px}.report-donut{width:120px;height:120px;border-radius:50%;background:#eee;border:6px solid #F8FAFC;box-shadow:0 4px 12px rgba(15,23,42,.08);flex-shrink:0}.report-legend{display:flex;flex-direction:column;gap:7px;font-size:10px;color:#334155;line-height:1.2}.report-legend span{display:flex;align-items:center;gap:6px}.report-swatch{width:10px;height:10px;border-radius:3px;display:inline-block;flex-shrink:0}
.report-mini-bars{display:flex;align-items:flex-end;gap:7px;height:132px;border-bottom:1px solid #CBD5E1;padding-top:4px}.report-mini-bar{flex:1;border-radius:6px 6px 0 0;min-height:3px}.report-mini-bar-label{font-size:8px;color:#475569;text-align:center;margin-top:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.report-mini-row{margin-bottom:10px}.report-mini-row-top{display:flex;justify-content:space-between;font-size:10px;color:#334155;margin-bottom:4px}.report-mini-track{height:12px;background:#E5E7EB;border-radius:99px;overflow:hidden}.report-mini-fill{height:100%;border-radius:99px}.report-small-note{font-size:9px;color:#64748B;margin-top:6px;line-height:1.25}.report-foot{border-top:1px solid #CBD5E1;margin-top:12px;padding-top:7px;font-size:9px;color:#64748B;display:flex;justify-content:space-between}.report-badge{display:inline-block;background:#DBEAFE;color:#1D4ED8;border-radius:999px;padding:3px 8px;font-size:9px;font-weight:800;margin-left:6px}
@media print{
  body.print-daily-summary .app, body.print-daily-summary .toast-wrap{display:none!important}
  body.print-daily-summary #dailyPdfReport{display:block!important}
  body.print-daily-summary{background:#fff!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;color-adjust:exact}
  body.print-daily-summary *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;color-adjust:exact!important}
  @page{size:A4;margin:7mm}
  #dailyPdfReport{display:block!important}
  .report-page{break-inside:avoid;page-break-inside:avoid}
}

</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-left"><h1>Daily Sales Dashboard</h1><p>Aptitude &amp; Slice45 — All Branches</p></div>
    <div class="top-tools">
      <button class="btn" id="loginBtn" style="flex:0;padding:7px 12px" onclick="openLogin()">Admin Login</button>
      <button class="btn" id="logoutBtn" style="flex:0;padding:7px 12px;display:none" onclick="logoutAdmin()">Logout</button>
      <button class="btn primary" style="flex:0;padding:7px 12px" onclick="exportPDF()">Export PDF Report</button>
      <span id="dataBackupTools" style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn" style="flex:0;padding:7px 12px" onclick="downloadBackup()" title="For admin use: saves a copy of all dashboard data">Download Data Backup</button>
        <label class="btn" style="flex:0;padding:7px 12px;cursor:pointer" title="For admin use: restores dashboard data from a backup file">Restore Data Backup<input type="file" accept="application/json" style="display:none" onchange="restoreBackup(event)"></label>
      </span>
      <span class="date-chip" id="datechip"></span>
    </div>
  </div>

  <div class="nav">
    <button class="nav-btn" onclick="showView('entry')" id="nb-entry">Daily entry</button>
    <button class="nav-btn active" onclick="showView('summary')" id="nb-summary">Today's summary</button>
    <button class="nav-btn" onclick="showView('mtd')" id="nb-mtd">MTD tracker</button>

    <button class="nav-btn" onclick="showView('analysis')" id="nb-analysis">Executive Analysis</button>

<script>
const STORAGE_VERSION=3;
const DEFAULT_BRANCHES=[
  {id:'al_qana',name:'Al Qana',color:'#2563EB',active:true},
  {id:'arc',name:'ARC',color:'#16A34A',active:true},
  {id:'arc_al_nahyan',name:'ARC Al Nahyan',color:'#DC2626',active:true},
  {id:'dge',name:'DGE',color:'#D97706',active:true},
  {id:'louvre_kiosk',name:'Louvre Kiosk',color:'#9333EA',active:true},
  {id:'slice45_khalidya',name:'Slice45 Khalidya',color:'#0D9488',active:true}
];
const KEY='aptslice_dashboard_v3';
const OLD_KEY='aptslice_sales_v2';
const DELIVERY_BRANCH_ID='arc_al_nahyan';

/*
  GOOGLE SHEETS CONNECTION
  1) Deploy the Apps Script file I provided as a Web App.
  2) Paste the Web App URL below between the quotes.
  3) Example: const GOOGLE_SCRIPT_URL='https://script.google.com/macros/s/XXXXX/exec';
*/
const GOOGLE_SCRIPT_URL='https://script.google.com/macros/s/AKfycbwxQQw_rS86Ev1d8X2s9lghtQqfdg5qZDAAlCqu9a6gjobvBuzEaBNHJTskt8t7NyuURg/exec';
const AUTH_KEY='aptslice_admin_session_v1';
const blankEntry=()=>({gross:0,food:0,bev:0,retail:0,costOfSales:0,cash:0,visa:0,master:0,bank:0,talabat:0,deliveroo:0,talabatOrders:0,deliverooOrders:0,discounts:0,takeawayCustomers:0,takeawaySales:0,covers:0,dineInSales:0,thirdPartyCustomers:0,thirdPartySales:0,transactions:0,saved:false});
let db=loadDB();
let activeB=0,curView='summary',entryDate=today(),selectedDay=today(),selectedMonth=today().substring(0,7),selectedYear=new Date().getFullYear(),role='viewer';
let mtdMode='month',mtdRangeFrom=today().substring(0,8)+'01',mtdRangeTo=today();
let ytdMode='year',ytdRangeFrom=today().substring(0,4)+'-01-01',ytdRangeTo=today();
let session={};
let auth=loadAuth();
let cloudReady=false;
let syncTimer=null;

function sanitizeId(s){return String(s||'').toLowerCase().trim().replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'')||('branch_'+Date.now())}
function today(){return new Date().toISOString().split('T')[0]}
function todayLbl(){return new Date().toLocaleDateString('en-AE',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}
function dateLbl(d){const k=normalizeDateKeyClient(d);const x=new Date(k+'T12:00:00');return isNaN(x.getTime())?String(d):x.toLocaleDateString('en-AE',{weekday:'short',day:'numeric',month:'short',year:'numeric'})}
const fmt=n=>'AED '+Number(n||0).toLocaleString('en-AE',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtN=n=>Number(n||0).toLocaleString('en-AE',{minimumFractionDigits:2,maximumFractionDigits:2});
const pct=(a,b)=>b?((a/b)*100).toFixed(1)+'%':'—';
const branches=()=>db.branches.filter(b=>b.active!==false);
const branchById=id=>db.branches.find(b=>b.id===id)||{id,name:id,color:'#7A7870'};
const isViewer=()=>role==='viewer';
const isEditor=()=>role==='editor';
const monthName=ym=>new Date((ym||today().substring(0,7))+'-01T12:00:00').toLocaleDateString('en-AE',{month:'long'});
const monthList=()=>Array.from({length:12},(_,i)=>({num:i+1,name:new Date(2026,i,1).toLocaleDateString('en-AE',{month:'long'})}));
function setSelectedMonthParts(prefix){const m=document.getElementById(prefix+'Month').value,y=document.getElementById(prefix+'Year').value;selectedMonth=y+'-'+String(m).padStart(2,'0');renderCurrent()}
function monthPicker(prefix='report'){const [y,m]=(selectedMonth||today().substring(0,7)).split('-').map(Number);return `<div class="fld"><label>Selected month</label><select id="${prefix}Month" onchange="setSelectedMonthParts('${prefix}')">${monthList().map(x=>`<option value="${x.num}" ${x.num===m?'selected':''}>${x.name}</option>`).join('')}</select></div><div class="fld"><label>Year</label><select id="${prefix}Year" onchange="setSelectedMonthParts('${prefix}')">${getYears().map(yy=>`<option value="${yy}" ${yy===y?'selected':''}>${yy}</option>`).join('')}</select></div>`}
function shiftDate(d,days){const x=new Date(d+'T12:00:00');x.setDate(x.getDate()+days);return x.toISOString().split('T')[0]}
function applyAutoMix(e){const g=Number(e.gross||0);e.food=round2(g*.75);e.bev=round2(g*.20);e.retail=round2(g*.05);e.costOfSales=round2(g*.27);e.dineInSales=round2(Math.max(0,g-(Number(e.takeawaySales||0)+Number(e.thirdPartySales||0))));return e}
function ensureEntryShape(e){return applyAutoMix({...blankEntry(),...(e||{})})}

function migrateBranches(d){
  if(!d||!Array.isArray(d.branches))return d;
  DEFAULT_BRANCHES.forEach(db_=>{if(!d.branches.some(b=>b.id===db_.id))d.branches.push({...db_})});
  return d;
}
function loadDB(){
  try{const raw=localStorage.getItem(KEY);if(raw)return migrateBranches(JSON.parse(raw))}catch(e){}
  const fresh={version:STORAGE_VERSION,branches:DEFAULT_BRANCHES,daily:{},budgets:{},role:'editor'};
  try{
    const old=localStorage.getItem(OLD_KEY);
    if(old){
      const h=JSON.parse(old);
      Object.keys(h).forEach(dt=>{fresh.daily[dt]={};Object.keys(h[dt]||{}).forEach(oldName=>{
        const br=DEFAULT_BRANCHES.find(x=>x.name===oldName); if(br)fresh.daily[dt][br.id]={...blankEntry(),...h[dt][oldName],saved:true};
      })});
    }
  }catch(e){}
  localStorage.setItem(KEY,JSON.stringify(fresh));
  return fresh;
}
function scriptConfigured(){return GOOGLE_SCRIPT_URL && !GOOGLE_SCRIPT_URL.includes('PASTE_YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL_HERE')}
function saveDB(){localStorage.setItem(KEY,JSON.stringify(db));queueCloudSync()}
function saveDBLocalOnly(){localStorage.setItem(KEY,JSON.stringify(db))}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
function loadAuth(){try{return JSON.parse(localStorage.getItem(AUTH_KEY)||'{}')}catch(e){return {}}}
function saveAuth(){localStorage.setItem(AUTH_KEY,JSON.stringify(auth||{}))}
function clearAuth(){auth={};localStorage.removeItem(AUTH_KEY)}
function openLogin(){document.getElementById('loginPanel').style.display='flex';setTimeout(()=>document.getElementById('loginUser').focus(),50)}
function closeLogin(){document.getElementById('loginPanel').style.display='none';document.getElementById('loginPass').value=''}
async function api(action,payload={}){
  if(!scriptConfigured())throw new Error('Google Sheet is not connected yet');
  const res=await fetch(GOOGLE_SCRIPT_URL,{method:'POST',body:JSON.stringify({action,token:auth.token||'',payload})});
  const data=await res.json();
  if(!data.ok)throw new Error(data.error||'Request failed');
  return data;
}

function normalizeDateKeyClient(v){
  const s=String(v||'').trim();
  if(!s)return '';
  const iso=s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(iso)return `${iso[1]}-${iso[2]}-${iso[3]}`;
  const months={Jan:'01',Feb:'02',Mar:'03',Apr:'04',May:'05',Jun:'06',Jul:'07',Aug:'08',Sep:'09',Oct:'10',Nov:'11',Dec:'12'};
  const gas=s.match(/^[A-Za-z]{3}\s+([A-Za-z]{3})\s+(\d{1,2})\s+(\d{4})\b/);
  if(gas&&months[gas[1]])return `${gas[3]}-${months[gas[1]]}-${String(gas[2]).padStart(2,'0')}`;
  const d=new Date(s);
  if(!isNaN(d.getTime())){
    const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0');
    return `${y}-${m}-${day}`;
  }
  return s;
}
function normalizeLoadedDb(incoming){
  if(!incoming)return incoming;
  const nd={};
  Object.keys(incoming.daily||{}).forEach(k=>{
    const nk=normalizeDateKeyClient(k);
    if(!nk)return;
    if(!nd[nk])nd[nk]={};
    Object.assign(nd[nk],incoming.daily[k]||{});
  });
  incoming.daily=nd;
  return migrateBranches(incoming);
}
function getPublicDataJsonp(){
  return new Promise((resolve,reject)=>{
    if(!scriptConfigured())return reject(new Error('Google Sheet is not connected yet'));
    const cb='aptitudePublicData_'+Date.now()+'_'+Math.floor(Math.random()*100000);
    const script=document.createElement('script');
    const sep=GOOGLE_SCRIPT_URL.includes('?')?'&':'?';
    window[cb]=(data)=>{cleanup();data&&data.ok?resolve(data):reject(new Error((data&&data.error)||'Public data request failed'))};
    function cleanup(){try{delete window[cb]}catch(e){window[cb]=undefined} if(script.parentNode)script.parentNode.removeChild(script)}
    script.onerror=()=>{cleanup();reject(new Error('Could not load public Google Sheet data'))};
    script.src=GOOGLE_SCRIPT_URL+sep+'action=getPublicData&callback='+encodeURIComponent(cb)+'&ts='+Date.now();
    document.head.appendChild(script);
    setTimeout(()=>{if(window[cb]){cleanup();reject(new Error('Public data request timed out'))}},15000);
  });
}
async function loginAdmin(){
  try{
    const username=document.getElementById('loginUser').value.trim();
    const password=document.getElementById('loginPass').value;
    if(!username||!password)return toast('Enter username and password');
    const data=await api('login',{username,password});
    auth={token:data.token,username:data.username,role:data.role,expiresAt:data.expiresAt};saveAuth();
    role='editor'; closeLogin();
    if(data.db){db=normalizeLoadedDb(data.db);saveDBLocalOnly()}
    initSessionFromDate(); renderAll(); toast('Admin login successful ✓');
  }catch(e){toast('Login failed: '+e.message)}
}
function logoutAdmin(){clearAuth();role='viewer';renderAll();toast('Logged out. Editing is now locked.')}
async function refreshFromCloud(silent=false){
  if(!scriptConfigured()){cloudReady=false;updateModeUI();return}
  try{
    let data;
    try{data=await getPublicDataJsonp()}
    catch(jsonpErr){data=await api('getPublicData',{})}
    if(data.db){db=normalizeLoadedDb(data.db);saveDBLocalOnly();cloudReady=true;initSessionFromDate();renderAll()}
    if(!silent)toast('Records loaded from Google Sheet ✓');
  }catch(e){cloudReady=false;updateModeUI();if(!silent)toast('Could not load Google Sheet data: '+e.message)}
}
async function validateSavedLogin(){
  if(!auth.token){role='viewer';return}
  try{
    const data=await api('validate',{});
    role=data.role==='admin'||data.role==='editor'?'editor':'viewer';
    if(data.db){db=normalizeLoadedDb(data.db);saveDBLocalOnly()}
  }catch(e){clearAuth();role='viewer'}
}
function queueCloudSync(){
  if(!scriptConfigured()||isViewer()||!auth.token)return;
  clearTimeout(syncTimer);
  syncTimer=setTimeout(async()=>{
    try{await api('saveFullDB',{db});cloudReady=true;updateModeUI()}
    catch(e){toast('Google Sheet sync failed: '+e.message);cloudReady=false;updateModeUI()}
  },700);
}
function updateModeUI(){
  const tools=document.getElementById('dataBackupTools');if(tools)tools.style.display=isViewer()?'none':'flex';
  const lb=document.getElementById('loginBtn');if(lb)lb.style.display=isViewer()?'inline-block':'none';
  const lo=document.getElementById('logoutBtn');if(lo)lo.style.display=isEditor()?'inline-block':'none';
}

function initSessionFromDate(){
  session={}; branches().forEach(b=>session[b.id]=ensureEntryShape(db.daily[entryDate]?.[b.id]));
  if(activeB>=branches().length)activeB=0;
}
function setEntryDate(v){entryDate=v||today();initSessionFromDate();renderEntry()}

function showView(v){curView=v;['entry','summary','mtd','ytd','analysis','history','budget','breakeven','events'].forEach(id=>{document.getElementById('view-'+id).style.display=id===v?'block':'none';document.getElementById('nb-'+id).classList.toggle('active',id===v)});renderCurrent()}
function renderCurrent(){if(curView==='summary')renderSummary();else if(curView==='mtd')renderMTD();else if(curView==='ytd')renderYTD();else if(curView==='analysis')renderAnalysis();else if(curView==='history')renderHistory();else if(curView==='budget')renderBudget();else if(curView==='breakeven')renderBreakeven();else if(curView==='events')renderEvents();else renderEntry()}
function renderAll(){updateModeUI();renderCurrent()}
function switchB(i){activeB=i;renderEntry()}
function upd(bid,f,v){
  if(isViewer())return;
  const num=parseFloat(v)||0;
  session[bid][f]=num;
  applyAutoMix(session[bid]);
  if(f==='gross'||f==='takeawaySales'||f==='thirdPartySales'){
    setValue('entry-food-input',session[bid].food?session[bid].food.toFixed(2):'');
    setValue('entry-bev-input',session[bid].bev?session[bid].bev.toFixed(2):'');
    setValue('entry-retail-input',session[bid].retail?session[bid].retail.toFixed(2):'');
    setValue('entry-cogs-input',session[bid].costOfSales?session[bid].costOfSales.toFixed(2):'');
    setValue('entry-dinein-sales',session[bid].dineInSales?session[bid].dineInSales.toFixed(2):'');
  }
  updateLiveEntry(bid);
}
function round2(n){return Math.round((Number(n)||0)*100)/100}
function setText(id,value){const el=document.getElementById(id);if(el)el.textContent=value}
function setValue(id,value){const el=document.getElementById(id);if(el)el.value=value}
function updateLiveEntry(bid){
  const d=session[bid]; if(!d)return;
  const gross=d.gross||0, exV=gross/1.05, vatA=gross-exV;
  const payT=(d.cash||0)+(d.visa||0)+(d.master||0)+(d.bank||0)+(d.talabat||0)+(d.deliveroo||0);
  const diff=Math.abs(gross-payT);
  const payOk=gross===0||diff<0.05;
  const mixT=(d.food||0)+(d.bev||0)+(d.retail||0);
  const mixOk=true;
  const gp=exV-(d.costOfSales||0);
  setText('entry-exv',fmtN(exV));
  setText('entry-vat',fmtN(vatA));
  setText('entry-avg-cover',d.covers>0?fmtN(exV/d.covers):'—');
  setText('entry-avg-txn',d.transactions>0?fmtN(gross/d.transactions):'—');
  setValue('entry-gp',fmtN(gp));
  const mix=document.getElementById('entry-mix-status');
  if(mix){mix.innerHTML=gross>0?`<div class="ok-box">✓ Revenue mix calculated automatically: Food 75%, Beverages 20%, Retail 5% of gross sales.</div>`:'';}
  const pay=document.getElementById('entry-pay-status');
  if(pay){
    pay.innerHTML=!payOk?`<div class="warn-box">⚠ Payment total (${fmtN(payT)}) differs from gross by AED ${fmtN(diff)}</div>`:(gross>0?`<div class="ok-box">✓ Payments reconciled</div>`:'');
  }
}
function clearB(bid){
  if(isViewer())return;
  session[bid]=blankEntry();
  renderEntry();
  toast('Form cleared. Click Save if you want to update the stored record.');
}
function saveB(bid){
  if(isViewer())return toast('Editing is available after admin login');
  applyAutoMix(session[bid]);
  session[bid].saved=true;
  if(!db.daily[entryDate])db.daily[entryDate]={};
  db.daily[entryDate][bid]={...session[bid],saved:true,updatedAt:new Date().toISOString()};
  saveDB();toast(branchById(bid).name+' saved for '+entryDate+' ✓');renderEntry();
}
function delDay(d){if(isViewer())return toast('Editing is available after admin login');delete db.daily[d];saveDB();toast('Deleted '+d);renderHistory()}

function renderEntry(){
  const bs=branches(); if(!bs.length){document.getElementById('view-entry').innerHTML='<div class="empty">No active branches. Add a branch in Branchwise budgeting.</div>';return}
  const b=bs[activeB],d=applyAutoMix(session[b.id]); const exV=d.gross/1.05,vatA=d.gross-exV,payT=(d.cash||0)+(d.visa||0)+(d.master||0)+(d.bank||0)+(d.talabat||0)+(d.deliveroo||0),diff=Math.abs(d.gross-payT),payOk=d.gross===0||diff<.05,mixT=(d.food||0)+(d.bev||0)+(d.retail||0),mixOk=mixT===0||Math.abs(exV-mixT)<.5;
  const disabled=isViewer()?'disabled':'';
  const tabs=bs.map((br,i)=>`<button class="btab ${i===activeB?'active':''}" onclick="switchB(${i})"><span class="bdot" style="background:${br.color}"></span>${br.name}${session[br.id]?.saved?'<span class="bcheck">✓</span>':''}</button>`).join('');
  document.getElementById('view-entry').innerHTML=`

<div class="card"><div class="grid-3"><div class="fld"><label>Entry date</label><input type="date" value="${entryDate}" onchange="setEntryDate(this.value)" ${disabled}></div><div class="fld"><label>Selected year</label><input value="${entryDate.substring(0,4)}" disabled></div><div class="fld"><label>Selected month</label><input value="${new Date(entryDate+'T12:00:00').toLocaleDateString('en-AE',{month:'long'})}" disabled></div></div><div class="small-note">Use the date field to enter or update previous date data. Reports use this date automatically.</div></div>
<div class="btabs">${tabs}</div>
<div class="card">
  <div class="card-header"><div><div class="card-title">${b.name}</div><div class="card-sub">${dateLbl(entryDate)}</div></div><span style="font-size:11px;color:${b.color};font-weight:600;background:${b.color}18;padding:3px 10px;border-radius:99px">Branch ${activeB+1} of ${bs.length}</span></div>
  <div class="section-lbl">Gross sales</div><div class="grid-2"><div class="fld"><label>Gross sales incl. 5% VAT (AED)</label><input type="number" min="0" step="0.01" placeholder="0.00" value="${d.gross||''}" oninput="upd('${b.id}','gross',this.value)" ${disabled}/></div></div>
  <div class="calc-strip"><div class="ci"><div class="cl">Ex. VAT</div><div class="cv" id="entry-exv">${fmtN(exV)}</div></div><div class="ci"><div class="cl">VAT 5%</div><div class="cv blue" id="entry-vat">${fmtN(vatA)}</div></div><div class="ci"><div class="cl">Avg / cover</div><div class="cv" id="entry-avg-cover">${d.covers>0?fmtN(exV/d.covers):'—'}</div></div><div class="ci"><div class="cl">Avg / txn</div><div class="cv" id="entry-avg-txn">${d.transactions>0?fmtN(d.gross/d.transactions):'—'}</div></div></div>
  <div class="section-lbl">Revenue mix — automatic</div><div class="grid-3"><div class="fld"><label>Food 75% of gross (AED)</label><input id="entry-food-input" type="number" min="0" step="0.01" value="${d.food||''}" readonly ${disabled}/></div><div class="fld"><label>Beverages 20% of gross (AED)</label><input id="entry-bev-input" type="number" min="0" step="0.01" value="${d.bev||''}" readonly ${disabled}/></div><div class="fld"><label>Retail 5% of gross (AED)</label><input id="entry-retail-input" type="number" min="0" step="0.01" value="${d.retail||''}" readonly ${disabled}/></div></div>
    <div class="section-lbl">Cost of sales</div><div class="grid-2"><div class="fld"><label>Cost of sales / COGS (AED) — auto 27% of gross</label><input id="entry-cogs-input" type="number" min="0" step="0.01" value="${d.costOfSales||''}" readonly ${disabled}/></div><div class="fld"><label>Gross profit after COGS</label><input id="entry-gp" value="${fmtN(exV-(d.costOfSales||0))}" disabled></div></div>
  <div class="section-lbl">Payment breakdown</div><div class="grid-4"><div class="fld"><label>Qlub (AED)</label><input type="number" min="0" step="0.01" value="${d.cash||''}" oninput="upd('${b.id}','cash',this.value)" ${disabled}/></div><div class="fld"><label>Visa (AED)</label><input type="number" min="0" step="0.01" value="${d.visa||''}" oninput="upd('${b.id}','visa',this.value)" ${disabled}/></div><div class="fld"><label>Mastercard (AED)</label><input type="number" min="0" step="0.01" value="${d.master||''}" oninput="upd('${b.id}','master',this.value)" ${disabled}/></div><div class="fld"><label>Bank transfer (AED)</label><input type="number" min="0" step="0.01" value="${d.bank||''}" oninput="upd('${b.id}','bank',this.value)" ${disabled}/></div></div>
  ${b.id===DELIVERY_BRANCH_ID?`<div class="section-lbl">Delivery platforms — ARC Al Nahyan only</div><div class="grid-4"><div class="fld"><label>Talabat orders</label><input type="number" min="0" step="1" value="${d.talabatOrders||''}" oninput="upd('${b.id}','talabatOrders',this.value)" ${disabled}/></div><div class="fld"><label>Talabat sale (AED)</label><input type="number" min="0" step="0.01" value="${d.talabat||''}" oninput="upd('${b.id}','talabat',this.value)" ${disabled}/></div><div class="fld"><label>Deliveroo orders</label><input type="number" min="0" step="1" value="${d.deliverooOrders||''}" oninput="upd('${b.id}','deliverooOrders',this.value)" ${disabled}/></div><div class="fld"><label>Deliveroo sale (AED)</label><input type="number" min="0" step="0.01" value="${d.deliveroo||''}" oninput="upd('${b.id}','deliveroo',this.value)" ${disabled}/></div></div>`:''}

function shiftMonthKey(mk,delta){const [y,m]=mk.split('-').map(Number);const d=new Date(y,m-1+delta,1);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')}

function priorComparablePeriod(days){

function yoyComparablePeriod(days){

  return {tag:variancePct>=0?'pos':'risk',text:`At the current run-rate, month-end sales are projected at ${fmt(projected)}, ${variancePct>=0?'above':'below'} the ${fmt(totalSalesBudget)} budget by ${Math.abs(variancePct).toFixed(1)}%${variancePct<0?' — intervention may be needed to close the gap.':'.'}`};

    const branchShares=branches().map(b=>{const fCur=first.agg[b.id]?.gross||0,lCur=last.agg[b.id]?.gross||0,fShare=first.t.gross?fCur/first.t.gross*100:0,lShare=last.t.gross?lCur/last.t.gross*100:0;return {name:b.name,delta:lShare-fShare,fShare,lShare}});

function daysInMonth(monthKey){const [y,m]=monthKey.split('-').map(Number);return new Date(y,m,0).getDate()}
function renderBudgetTrend(monthKey,totalSalesBudget,totalCostBudget){
  const dim=daysInMonth(monthKey), dailySalesTarget=totalSalesBudget/dim, dailyCostTarget=totalCostBudget/dim;
  const pts=[];let salesCum=0,costCum=0;
  for(let i=1;i<=dim;i++){
    const d=monthKey+'-'+String(i).padStart(2,'0');
    branches().forEach(b=>{const e=db.daily[d]?.[b.id];if(e){salesCum+=(e.gross||0);costCum+=(e.costOfSales||0)}});
    pts.push({day:i,sales:salesCum,salesTarget:dailySalesTarget*i,cost:costCum,costTarget:dailyCostTarget*i});
  }
  const w=680,h=240,pad=34;
  const maxVal=Math.max(1,totalSalesBudget,totalCostBudget,...pts.flatMap(p=>[p.sales,p.salesTarget,p.cost,p.costTarget]));
  const x=d=>pad+(d-1)*((w-pad*2)/(Math.max(dim-1,1)));
  const y=v=>h-pad-(v/maxVal)*(h-pad*2);
  const poly=(arr,key)=>arr.map(p=>`${x(p.day).toFixed(1)},${y(p[key]).toFixed(1)}`).join(' ');
  const last=pts[pts.length-1]||{sales:0,cost:0,salesTarget:0,costTarget:0};
  return `<div class="chart-card"><div class="chart-title">Monthly budget trend</div><div class="chart-sub">Cumulative actuals vs prorated monthly budget</div><svg viewBox="0 0 ${w} ${h}" style="width:100%;height:260px;overflow:visible"><line x1="${pad}" y1="${h-pad}" x2="${w-pad}" y2="${h-pad}" stroke="#E8E6E0"/><line x1="${pad}" y1="${pad}" x2="${pad}" y2="${h-pad}" stroke="#E8E6E0"/><polyline points="${poly(pts,'salesTarget')}" fill="none" stroke="#93C5FD" stroke-width="2" stroke-dasharray="6 5"/><polyline points="${poly(pts,'sales')}" fill="none" stroke="#2563EB" stroke-width="3"/><polyline points="${poly(pts,'costTarget')}" fill="none" stroke="#FCA5A5" stroke-width="2" stroke-dasharray="6 5"/><polyline points="${poly(pts,'cost')}" fill="none" stroke="#DC2626" stroke-width="3"/><text x="${pad}" y="18" font-size="11" fill="#7A7870">AED ${Math.round(maxVal).toLocaleString('en-AE')}</text><text x="${pad}" y="${h-8}" font-size="11" fill="#7A7870">Day 1</text><text x="${w-pad-40}" y="${h-8}" font-size="11" fill="#7A7870">Day ${dim}</text></svg><div class="pay-mix"><span class="pay-pill card">Sales actual: ${fmt(last.sales)}</span><span class="pay-pill card">Sales budget line: ${fmt(last.salesTarget)}</span><span class="pay-pill cash">Cost actual: ${fmt(last.cost)}</span><span class="pay-pill cash">Cost budget line: ${fmt(last.costTarget)}</span></div></div>`;
}
function renderBudgetWaterfall(totalSalesBudget,actualSales,totalCostBudget,actualCost){
  const salesVar=actualSales-totalSalesBudget,costVar=actualCost-totalCostBudget;
  const steps=[
    {label:'Sales Budget',value:totalSalesBudget,type:'base'},
    {label:'Sales Variance',value:salesVar,type:salesVar>=0?'up':'down'},
    {label:'Actual Sales',value:actualSales,type:'total'},
    {label:'Cost Budget',value:totalCostBudget,type:'base'},
    {label:'Cost Variance',value:costVar,type:costVar<=0?'up':'down'},
    {label:'Actual Cost',value:actualCost,type:'total'}
  ];
  const maxVal=Math.max(1,...steps.map(s=>Math.abs(s.value)),totalSalesBudget,actualSales,totalCostBudget,actualCost);
  const bars=steps.map(s=>{const pct=Math.max(3,Math.min(100,Math.abs(s.value)/maxVal*100));const color=s.type==='up'?'var(--green)':s.type==='down'?'var(--red)':s.type==='total'?'var(--text)':'var(--blue)';return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:9px"><div style="width:105px;font-size:12px;color:var(--muted)">${s.label}</div><div style="flex:1;height:18px;background:var(--bg);border:1px solid var(--border);border-radius:5px;overflow:hidden"><div style="height:100%;width:${pct}%;background:${color}"></div></div><div class="mono" style="width:110px;text-align:right;font-size:12px">${fmt(s.value)}</div></div>`}).join('');
  return `<div class="chart-card"><div class="chart-title">Variance waterfall</div><div class="chart-sub">Shows how budget moves to actual for sales and cost</div>${bars}<div class="small-note">Green is favorable. Red is unfavorable. For cost, spending below budget is favorable.</div></div>`;
}
function renderBudgetCharts(bud,agg,totalSalesBudget,totalCostBudget,actualSales,actualCost){

function renderRunRateForecast(monthKey,totalSalesBudget,totalCostBudget,actualSales,actualCost){
  const dim=daysInMonth(monthKey);
  const [y,m]=monthKey.split('-').map(Number);
  const now=new Date();
  const isCurrentMonth=(now.getFullYear()===y&&(now.getMonth()+1)===m);
  const isPastMonth=(y<now.getFullYear())||(y===now.getFullYear()&&m<(now.getMonth()+1));
  const daysElapsed=isCurrentMonth?now.getDate():(isPastMonth?dim:0);
  const remainingDays=Math.max(0,dim-daysElapsed);
  if(daysElapsed<=0){
    return `<div class="chart-card"><div class="chart-title">Run-rate forecast</div><div class="chart-sub">Available once the selected month begins</div></div>`;
  }
  const avgDailySales=actualSales/daysElapsed,avgDailyCost=actualCost/daysElapsed;
  const projectedSales=avgDailySales*dim,projectedCost=avgDailyCost*dim;
  const salesVar=projectedSales-totalSalesBudget,costVar=projectedCost-totalCostBudget;
  const reqDaily=remainingDays>0?(totalSalesBudget-actualSales)/remainingDays:null;
  return `<div class="chart-card"><div class="chart-title">Run-rate forecast</div><div class="chart-sub">Based on the average daily pace so far (Day ${daysElapsed} of ${dim})</div><div class="ratio-grid"><div class="ratio-card"><div class="rl">Avg daily sales so far</div><div class="rv">${fmtN(avgDailySales)}</div><div class="rs">Ex. VAT not applied</div></div><div class="ratio-card"><div class="rl">Projected month-end sales</div><div class="rv">${fmtN(projectedSales)}</div><div class="rs">${totalSalesBudget?ratio(projectedSales,totalSalesBudget):'—'} of sales budget</div></div><div class="ratio-card"><div class="rl">Forecast sales variance</div><div class="rv" style="color:${salesVar>=0?'var(--green)':'var(--red)'}">${fmtN(salesVar)}</div><div class="rs">${salesVar>=0?'Tracking above':'Tracking below'} budget pace</div></div><div class="ratio-card"><div class="rl">Required daily avg — remaining</div><div class="rv">${reqDaily!=null?fmtN(Math.max(0,reqDaily)):'—'}</div><div class="rs">${remainingDays} day${remainingDays!==1?'s':''} left to hit sales budget</div></div><div class="ratio-card"><div class="rl">Projected month-end cost</div><div class="rv">${fmtN(projectedCost)}</div><div class="rs">${totalCostBudget?ratio(projectedCost,totalCostBudget):'—'} of cost budget</div></div><div class="ratio-card"><div class="rl">Forecast cost variance</div><div class="rv" style="color:${costVar<=0?'var(--green)':'var(--red)'}">${fmtN(costVar)}</div><div class="rs">${costVar<=0?'Tracking under':'Tracking over'} budget pace</div></div></div><div class="small-note">Forecast assumes the rest of the month continues at the current daily average. It will update automatically as more days are recorded.</div></div>`;
}

function blankEvent(){return {id:'',name:'',date:today(),organizer:'',gross:0,cash:0,visa:0,master:0,bank:0,commission:0,notes:''}}
let eventForm=blankEvent();
let editingEventId=null;
let eventsFilterFrom='',eventsFilterTo='';
function newEventForm(){if(isViewer())return;editingEventId=null;eventForm=blankEvent();renderEvents()}
function editEvent(id){
  if(isViewer())return;
  const ev=(db.events||[]).find(e=>e.id===id);
  if(!ev)return;
  editingEventId=id;
  eventForm={...blankEvent(),...ev};
  renderEvents();
}
function updEventField(f,v){
  if(isViewer())return;
  if(f==='name'||f==='date'||f==='organizer'||f==='notes')eventForm[f]=v;
  else eventForm[f]=parseFloat(v)||0;
  renderEvents();
}
function saveEvent(){
  if(isViewer())return toast('Editing is available after admin login');
  if(!eventForm.name||!eventForm.name.trim())return toast('Enter an event name');
  if(!db.events)db.events=[];
  if(editingEventId){
    const idx=db.events.findIndex(e=>e.id===editingEventId);
    if(idx>-1)db.events[idx]={...eventForm,id:editingEventId,updatedAt:new Date().toISOString()};
  }else{
    const id='evt_'+Date.now();
    db.events.push({...eventForm,id,updatedAt:new Date().toISOString()});
  }
  saveDB();
  editingEventId=null;
  eventForm=blankEvent();
  toast('Event saved ✓');
  renderEvents();
}
function deleteEvent(id){
  if(isViewer())return toast('Editing is available after admin login');
  if(!confirm('Delete this event record?'))return;
  db.events=(db.events||[]).filter(e=>e.id!==id);
  if(editingEventId===id){editingEventId=null;eventForm=blankEvent();}
  saveDB();
  toast('Event deleted');
  renderEvents();
}
function setEventsFilter(which,v){if(which==='from')eventsFilterFrom=v;else eventsFilterTo=v;renderEvents()}

    <div class="report-kpis"><div class="report-kpi"><div class="label">Gross incl. VAT</div><div class="value">${fmtN(t.gross)}</div></div><div class="report-kpi"><div class="label">Sales ex. VAT</div><div class="value">${fmtN(t.exv)}</div></div><div class="report-kpi amber"><div class="label">VAT</div><div class="value">${fmtN(t.vat)}</div></div><div class="report-kpi red"><div class="label">COGS</div><div class="value">${fmtN(t.costOfSales)}</div></div><div class="report-kpi green"><div class="label">Gross profit</div><div class="value">${fmtN(t.grossProfit)}</div></div><div class="report-kpi"><div class="label">Customers / Txn</div><div class="value">${t.covers} / ${t.transactions}</div></div></div>
    ${renderReportCommentary(commentaryItems)}
    <div class="report-grid-2"><div class="report-card"><div class="report-section-title">Sales contribution by branch</div><div class="report-bars">${bars}</div></div><div class="report-card"><div class="report-section-title">Ratio analysis</div><div class="report-ratios"><div class="report-ratio"><div class="label">Gross margin</div><div class="value">${ratio(t.grossProfit,t.exv)}</div></div><div class="report-ratio"><div class="label">COGS / Gross</div><div class="value">${ratio(t.costOfSales,t.gross)}</div></div><div class="report-ratio"><div class="label">Discount / Gross</div><div class="value">${ratio(t.discounts,t.gross)}</div></div><div class="report-ratio"><div class="label">Avg per day</div><div class="value">${days.length?fmtN(t.gross/days.length):'—'}</div></div></div></div></div>
    <div class="report-section-title">Management visuals</div><div class="report-visual-grid"><div class="report-mini-card"><div class="report-mini-title">Revenue mix</div><div class="report-donut-wrap"><div class="report-donut" style="background:conic-gradient(#2563EB 0 ${revFood}%, #16A34A ${revFood}% ${revFood+revBev}%, #D97706 ${revFood+revBev}% 100%)"></div><div class="report-legend"><span><i class="report-swatch" style="background:#2563EB"></i>Food ${revFood.toFixed(1)}%</span><span><i class="report-swatch" style="background:#16A34A"></i>Beverages ${revBev.toFixed(1)}%</span><span><i class="report-swatch" style="background:#D97706"></i>Retail ${revRetail.toFixed(1)}%</span></div></div><div class="report-small-note">Auto-calculated from gross sales.</div></div><div class="report-mini-card"><div class="report-mini-title">Payment mix</div><div class="report-donut-wrap"><div class="report-donut" style="background:conic-gradient(#16A34A 0 ${payCash}%, #2563EB ${payCash}% ${payCash+payCard}%, #0D9488 ${payCash+payCard}% ${payCash+payCard+payBank}%, #EA580C ${payCash+payCard+payBank}% ${payCash+payCard+payBank+payTalabat}%, #00CCBC ${payCash+payCard+payBank+payTalabat}% 100%)"></div><div class="report-legend"><span><i class="report-swatch" style="background:#16A34A"></i>Qlub ${payCash.toFixed(1)}%</span><span><i class="report-swatch" style="background:#2563EB"></i>Cards ${payCard.toFixed(1)}%</span><span><i class="report-swatch" style="background:#0D9488"></i>Bank ${payBank.toFixed(1)}%</span><span><i class="report-swatch" style="background:#EA580C"></i>Talabat ${payTalabat.toFixed(1)}%</span><span><i class="report-swatch" style="background:#00CCBC"></i>Deliveroo ${payDeliveroo.toFixed(1)}%</span></div></div><div class="report-small-note">Payment receipt split.</div></div><div class="report-mini-card"><div class="report-mini-title">Top branch sales</div><div class="report-mini-bars">${branchMini}</div></div><div class="report-mini-card"><div class="report-mini-title">Margin dashboard</div><div class="report-mini-row"><div class="report-mini-row-top"><span>Gross margin</span><b>${gpPct.toFixed(1)}%</b></div><div class="report-mini-track"><div class="report-mini-fill" style="width:${Math.min(gpPct,100)}%;background:#16A34A"></div></div></div><div class="report-mini-row"><div class="report-mini-row-top"><span>COGS / gross</span><b>${cogsPct.toFixed(1)}%</b></div><div class="report-mini-track"><div class="report-mini-fill" style="width:${Math.min(cogsPct,100)}%;background:#D97706"></div></div></div><div class="report-mini-row"><div class="report-mini-row-top"><span>Discount / gross</span><b>${discPct.toFixed(1)}%</b></div><div class="report-mini-track"><div class="report-mini-fill" style="width:${Math.min(discPct,100)}%;background:#DC2626"></div></div></div></div></div>
    <div class="report-foot"><span>Prepared from Daily Entry records.</span><span>Page 1 of 2</span></div></div>
  <div class="report-page"><div class="report-head"><div><div class="report-title">Branchwise Channel &amp; Financial Report</div><div style="font-size:12px;color:#E0ECFF">Dine-in, takeaway, online and financial breakdown by branch</div></div><div class="report-meta"><div><b>Period:</b> ${label}</div><div><b>Currency:</b> AED</div></div></div><div class="report-section-title">Branchwise sales by channel</div><table class="report-table"><thead><tr><th rowspan="2">Branch</th><th rowspan="2">Total sale</th><th colspan="2">Dine-in</th><th colspan="2">Takeaway</th><th colspan="2">Online</th></tr><tr><th>Customer</th><th>Sale</th><th>Customer</th><th>Sale</th><th>Customer</th><th>Sale</th></tr></thead><tbody>${branchChannelRows(agg)}</tbody><tfoot>${branchChannelTotals(t)}</tfoot></table><div class="report-section-title" style="margin-top:14px">Branchwise financial breakdown</div><table class="report-table"><thead><tr><th>Branch</th><th>Gross</th><th>Ex. VAT</th><th>COGS</th><th>Gross profit</th><th>GP %</th><th>Covers</th><th>Share</th></tr></thead><tbody>${branchFinRows}</tbody><tfoot><tr><td class="name">Total</td><td>${fmtN(t.gross)}</td><td>${fmtN(t.exv)}</td><td>${fmtN(t.costOfSales)}</td><td>${fmtN(t.grossProfit)}</td><td>${ratio(t.grossProfit,t.exv)}</td><td>${t.covers}</td><td>100%</td></tr></tfoot></table><div class="report-foot"><span>Prepared from Daily Entry records.</span><span>Page 2 of 2</span></div></div>`;
}
function exportPDF(){
  const target=document.getElementById('dailyPdfReport');
  if(curView==='mtd'){
    const mDays=mtdDays();
    target.innerHTML=buildRangeReport(mDays,mtdLabel(),mtdMode==='range'?'Custom Range Sales Report':'MTD Sales Report',getMtdCommentary(mDays));
  }else if(curView==='ytd'){
    const yDays=ytdDays();
    target.innerHTML=buildRangeReport(yDays,ytdLabel(),ytdMode==='range'?'Custom Range Sales Report':'YTD Sales Report',getYtdCommentary(yDays));
  }else if(curView==='analysis'){
    const aDays=Object.keys(db.daily).sort();
    if(aDays.length){
      target.innerHTML=buildRangeReport(aDays,'Since '+dateLbl(aDays[0]),'Executive Analysis Report',buildAnalysisCommentary());
    }
  }else{
    const reportDate=(curView==='entry'?entryDate:(selectedDay||today()));
    target.innerHTML=buildDailySummaryReport(reportDate);
  }
  document.body.classList.add('print-daily-summary');
  const cleanup=()=>document.body.classList.remove('print-daily-summary');
  window.onafterprint=cleanup;
  setTimeout(()=>window.print(),80);
  setTimeout(cleanup,1200);
}
function downloadBackup(){if(isViewer())return toast('Editing is available after admin login');const blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download='aptitude-dashboard-data-backup-'+today()+'.json';a.click();URL.revokeObjectURL(url);toast('Data backup downloaded ✓')}
function restoreBackup(ev){if(isViewer()){ev.target.value='';return toast('Editing is available after admin login')}const file=ev.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=()=>{try{const imported=JSON.parse(reader.result);if(!imported.daily||!imported.branches)throw new Error('Invalid file');db=imported;role=auth.token?'editor':'viewer';saveDB();initSessionFromDate();renderAll();toast('Data backup restored ✓')}catch(e){toast('Restore failed: please choose a valid backup file')}};reader.readAsText(file);ev.target.value=''}

document.getElementById('datechip').textContent=todayLbl();
(async function startDashboard(){
  initSessionFromDate();updateModeUI();renderSummary();
  await validateSavedLogin();
  if(scriptConfigured()) await refreshFromCloud(true);
  initSessionFromDate();renderAll();
})();
</script>
