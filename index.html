<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Daily Sales Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F7F6F3;
  --surface:#FFFFFF;
  --border:#E8E6E0;
  --border2:#D4D1C8;
  --text:#1A1916;
  --muted:#7A7870;
  --hint:#B0AEA8;
  --blue:#2563EB;
  --blue-bg:#EFF4FF;
  --green:#16A34A;
  --green-bg:#F0FDF4;
  --amber:#D97706;
  --amber-bg:#FFFBEB;
  --red:#DC2626;
  --red-bg:#FEF2F2;
  --teal:#0D9488;
  --teal-bg:#F0FDFA;
  --r:10px;
  --r-sm:6px;
  --shadow:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}
.mono{font-family:'DM Mono',monospace}

/* Layout */
.app{max-width:900px;margin:0 auto;padding:24px 16px 60px}
.header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px}
.header-left h1{font-size:22px;font-weight:600;letter-spacing:-0.3px}
.header-left p{font-size:13px;color:var(--muted);margin-top:2px}
.date-chip{background:var(--surface);border:1px solid var(--border);border-radius:99px;padding:5px 14px;font-size:12px;color:var(--muted);font-weight:500}

/* Nav */
.nav{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:4px;margin-bottom:24px;box-shadow:var(--shadow)}
.nav-btn{flex:1;padding:7px 8px;border:none;border-radius:var(--r-sm);background:transparent;font-family:inherit;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .15s}
.nav-btn.active{background:var(--text);color:#fff}
.nav-btn:hover:not(.active){background:var(--bg);color:var(--text)}

/* Branch tabs */
.btabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.btab{display:flex;align-items:center;gap:6px;padding:6px 14px;border:1px solid var(--border);border-radius:99px;background:var(--surface);font-family:inherit;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .15s;box-shadow:var(--shadow)}
.btab.active{border-color:var(--text);color:var(--text);background:var(--surface)}
.btab:hover:not(.active){border-color:var(--border2)}
.bdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.bcheck{font-size:10px;color:var(--green)}

/* Card */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:16px;box-shadow:var(--shadow)}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-title{font-size:14px;font-weight:600}
.card-sub{font-size:12px;color:var(--muted)}

/* Form */
.section-lbl{font-size:10px;font-weight:600;color:var(--hint);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;margin-top:16px}
.section-lbl:first-child{margin-top:0}
.grid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px}
.grid-3{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px}
.grid-4{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px}
.fld{display:flex;flex-direction:column;gap:4px}
.fld label{font-size:11px;font-weight:500;color:var(--muted)}
.fld input{padding:8px 10px;border:1px solid var(--border);border-radius:var(--r-sm);font-family:'DM Mono',monospace;font-size:13px;color:var(--text);background:var(--surface);outline:none;transition:border .15s}
.fld input:focus{border-color:var(--blue)}
.fld input:hover{border-color:var(--border2)}

/* Calc strip */
.calc-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:0;background:var(--bg);border:1px solid var(--border);border-radius:var(--r-sm);overflow:hidden;margin:12px 0}
.ci{padding:10px 14px;border-right:1px solid var(--border)}
.ci:last-child{border-right:none}
.ci .cl{font-size:10px;font-weight:600;color:var(--hint);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.ci .cv{font-size:15px;font-weight:600;font-family:'DM Mono',monospace;color:var(--text)}
.ci .cv.blue{color:var(--blue)}
.ci .cv.green{color:var(--green)}

/* Warn */
.warn-box{background:var(--amber-bg);border:1px solid #FDE68A;border-radius:var(--r-sm);padding:8px 12px;font-size:12px;color:var(--amber);margin-top:10px;display:flex;align-items:center;gap:6px}
.ok-box{background:var(--green-bg);border:1px solid #BBF7D0;border-radius:var(--r-sm);padding:8px 12px;font-size:12px;color:var(--green);margin-top:10px;display:flex;align-items:center;gap:6px}

/* Buttons */
.btn-row{display:flex;gap:8px;margin-top:16px}
.btn{flex:1;padding:9px 16px;border-radius:var(--r-sm);font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--bg);color:var(--muted);transition:all .15s}
.btn:hover{border-color:var(--border2);color:var(--text)}
.btn.primary{background:var(--text);color:#fff;border-color:var(--text)}
.btn.primary:hover{opacity:.88}
.btn.report{background:var(--blue-bg);color:var(--blue);border-color:#BFDBFE;font-weight:600}
.btn.report:hover{background:#DBEAFE}

/* Metric cards */
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:16px}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;box-shadow:var(--shadow)}
.metric .ml{font-size:11px;color:var(--muted);font-weight:500;margin-bottom:6px}
.metric .mv{font-size:20px;font-weight:600;font-family:'DM Mono',monospace;letter-spacing:-0.5px}
.metric .ms{font-size:11px;color:var(--muted);margin-top:3px}
.metric.blue .mv{color:var(--blue)}
.metric.green .mv{color:var(--green)}
.metric.amber .mv{color:var(--amber)}

/* Table */
.tbl-wrap{overflow-x:auto;margin-top:4px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;padding:8px 10px;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap;background:var(--bg)}
td{padding:9px 10px;border-bottom:1px solid var(--border);color:var(--text);white-space:nowrap;font-family:'DM Mono',monospace;font-size:12px}
tbody tr:last-child td{border-bottom:none}
tfoot td{font-weight:600;background:var(--bg);border-top:1px solid var(--border2)}
.outlet-name{font-family:'DM Sans',sans-serif;font-weight:500;display:flex;align-items:center;gap:6px}

/* Bar chart */
.bar-section{margin-top:4px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.bar-lbl{width:120px;font-size:12px;color:var(--muted);flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;background:var(--bg);border-radius:3px;height:8px;overflow:hidden;border:1px solid var(--border)}
.bar-fill{height:100%;border-radius:2px;transition:width .4s cubic-bezier(.4,0,.2,1)}
.bar-val{font-size:11px;font-weight:600;font-family:'DM Mono',monospace;color:var(--text);min-width:100px;text-align:right}

/* History */
.hist-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.hist-row:last-child{border-bottom:none}
.hist-date{font-size:13px;font-weight:500}
.hist-sub{font-size:11px;color:var(--muted);margin-top:1px}
.hist-amt{text-align:right}
.hist-amt .main{font-size:13px;font-weight:600;font-family:'DM Mono',monospace}
.hist-amt .sub{font-size:11px;color:var(--blue);font-family:'DM Mono',monospace;margin-top:1px}
.del-btn{background:none;border:none;color:var(--hint);cursor:pointer;padding:4px 6px;border-radius:4px;font-size:13px;line-height:1;transition:color .15s}
.del-btn:hover{color:var(--red)}

/* Empty */
.empty{text-align:center;padding:36px 20px;color:var(--hint);font-size:13px;border:1px dashed var(--border2);border-radius:var(--r)}
.empty svg{margin-bottom:8px;opacity:.4}

/* Toast */
.toast-wrap{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:999;pointer-events:none}
.toast{background:var(--text);color:#fff;padding:9px 20px;border-radius:99px;font-size:13px;font-weight:500;opacity:0;transition:opacity .2s;white-space:nowrap;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.toast.show{opacity:1}

/* Payment mix pills */
.pay-mix{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.pay-pill{font-size:11px;padding:3px 10px;border-radius:99px;font-weight:500}
.pay-pill.cash{background:var(--green-bg);color:var(--green)}
.pay-pill.card{background:var(--blue-bg);color:var(--blue)}
.pay-pill.bank{background:var(--teal-bg);color:var(--teal)}

@media(max-width:480px){
  .nav-btn{font-size:11px;padding:6px 4px}
  .metrics{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<div class="app">
  <div class="header">
  <div class="header-left">
    <h1>Daily Sales Dashboard</h1>
    <p>Aptitude &amp; Slice45 — All Branches</p>
  </div>

  <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">

```
<a href="budget-dashboard.html"
   style="
    background:#2563EB;
    color:white;
    text-decoration:none;
    padding:8px 16px;
    border-radius:8px;
    font-size:13px;
    font-weight:600;
    box-shadow:0 1px 3px rgba(0,0,0,.1);
   ">
   📊 Budget Dashboard
</a>

<span class="date-chip" id="datechip"></span>
```

  </div>
</div>


  <div class="nav">
    <button class="nav-btn active" onclick="showView('entry')" id="nb-entry">Daily entry</button>
    <button class="nav-btn" onclick="showView('summary')" id="nb-summary">Today's summary</button>
    <button class="nav-btn" onclick="showView('mtd')" id="nb-mtd">MTD tracker</button>
    <button class="nav-btn" onclick="showView('history')" id="nb-history">History</button>
  </div>

  <div id="view-entry"></div>
  <div id="view-summary" style="display:none"></div>
  <div id="view-mtd" style="display:none"></div>
  <div id="view-history" style="display:none"></div>
</div>

<div class="toast-wrap"><div class="toast" id="toast"></div></div>

<script>
const BRANCHES=['Al Qana','ARC','DGE','Louvre Kiosk','Slice45 Khalidya'];
const COLORS=['#2563EB','#16A34A','#D97706','#9333EA','#0D9488'];
const KEY='aptslice_sales_v2';
let activeB=0,curView='entry';
let session={};
BRANCHES.forEach(b=>session[b]={gross:0,food:0,bev:0,retail:0,cash:0,visa:0,master:0,bank:0,discounts:0,covers:0,transactions:0,saved:false});

const fmt=n=>'AED '+Number(n||0).toLocaleString('en-AE',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtN=n=>Number(n||0).toLocaleString('en-AE',{minimumFractionDigits:2,maximumFractionDigits:2});
const today=()=>new Date().toISOString().split('T')[0];
const todayLbl=()=>new Date().toLocaleDateString('en-AE',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
const loadH=()=>{try{const r=localStorage.getItem(KEY);return r?JSON.parse(r):{}}catch(e){return{}}};
const saveH=h=>{try{localStorage.setItem(KEY,JSON.stringify(h))}catch(e){}};
const getH=()=>loadH();

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}

function showView(v){
  curView=v;
  ['entry','summary','mtd','history'].forEach(id=>{
    document.getElementById('view-'+id).style.display=id===v?'block':'none';
    document.getElementById('nb-'+id).classList.toggle('active',id===v);
  });
  if(v==='summary')renderSummary();
  else if(v==='mtd')renderMTD();
  else if(v==='history')renderHistory();
  else renderEntry();
}

function switchB(i){activeB=i;renderEntry()}

function renderEntry(){
  const b=BRANCHES[activeB],d=session[b];
  const exV=d.gross/1.05,vatA=d.gross-exV;
  const payT=(d.cash||0)+(d.visa||0)+(d.master||0)+(d.bank||0);
  const diff=Math.abs(d.gross-payT);
  const payOk=d.gross===0||diff<0.05;
  const mixT=(d.food||0)+(d.bev||0)+(d.retail||0);
  const mixOk=mixT===0||Math.abs(exV-mixT)<0.5;

  const tabs=BRANCHES.map((br,i)=>`<button class="btab ${i===activeB?'active':''}" onclick="switchB(${i})"><span class="bdot" style="background:${COLORS[i]}"></span>${br}${session[br].saved?'<span class="bcheck">✓</span>':''}</button>`).join('');

  document.getElementById('view-entry').innerHTML=`
<div class="btabs">${tabs}</div>
<div class="card">
  <div class="card-header">
    <div><div class="card-title">${b}</div><div class="card-sub">${todayLbl()}</div></div>
    <span style="font-size:11px;color:${COLORS[activeB]};font-weight:600;background:${COLORS[activeB]}18;padding:3px 10px;border-radius:99px">Branch ${activeB+1} of 5</span>
  </div>

  <div class="section-lbl">Gross sales</div>
  <div class="grid-2">
    <div class="fld"><label>Gross sales incl. 5% VAT (AED)</label><input type="number" min="0" step="0.01" placeholder="0.00" value="${d.gross||''}" oninput="upd('${b}','gross',this.value)"/></div>
  </div>
  <div class="calc-strip">
    <div class="ci"><div class="cl">Ex. VAT</div><div class="cv">${fmtN(exV)}</div></div>
    <div class="ci"><div class="cl">VAT 5%</div><div class="cv blue">${fmtN(vatA)}</div></div>
    <div class="ci"><div class="cl">Avg / cover</div><div class="cv">${d.covers>0?fmtN(exV/d.covers):'—'}</div></div>
    <div class="ci"><div class="cl">Avg / txn</div><div class="cv">${d.transactions>0?fmtN(d.gross/d.transactions):'—'}</div></div>
  </div>

  <div class="section-lbl">Revenue mix (ex. VAT)</div>
  <div class="grid-3">
    <div class="fld"><label>Food (AED)</label><input type="number" min="0" step="0.01" placeholder="0.00" value="${d.food||''}" oninput="upd('${b}','food',this.value)"/></div>
    <div class="fld"><label>Beverage (AED)</label><input type="number" min="0" step="0.01" placeholder="0.00" value="${d.bev||''}" oninput="upd('${b}','bev',this.value)"/></div>
    <div class="fld"><label>Retail (AED)</label><input type="number" min="0" step="0.01" placeholder="0.00" value="${d.retail||''}" oninput="upd('${b}','retail',this.value)"/></div>
  </div>
  ${!mixOk&&d.gross>0?`<div class="warn-box">⚠ Mix total (${fmtN(mixT)}) doesn't match ex-VAT sales (${fmtN(exV)})</div>`:''}

  <div class="section-lbl">Payment breakdown</div>
  <div class="grid-4">
    <div class="fld"><label>Cash (AED)</label><input type="number" min="0" step="0.01" placeholder="0.00" value="${d.cash||''}" oninput="upd('${b}','cash',this.value)"/></div>
    <div class="fld"><label>Visa (AED)</label><input type="number" min="0" step="0.01" placeholder="0.00" value="${d.visa||''}" oninput="upd('${b}','visa',this.value)"/></div>
    <div class="fld"><label>Mastercard (AED)</label><input type="number" min="0" step="0.01" placeholder="0.00" value="${d.master||''}" oninput="upd('${b}','master',this.value)"/></div>
    <div class="fld"><label>Bank transfer (AED)</label><input type="number" min="0" step="0.01" placeholder="0.00" value="${d.bank||''}" oninput="upd('${b}','bank',this.value)"/></div>
  </div>
  ${!payOk?`<div class="warn-box">⚠ Payment total (${fmtN(payT)}) differs from gross by AED ${fmtN(diff)}</div>`:d.gross>0?`<div class="ok-box">✓ Payments reconciled</div>`:''}

  <div class="section-lbl">Discounts, covers &amp; transactions</div>
  <div class="grid-3">
    <div class="fld"><label>Total discounts (AED)</label><input type="number" min="0" step="0.01" placeholder="0.00" value="${d.discounts||''}" oninput="upd('${b}','discounts',this.value)"/></div>
    <div class="fld"><label>Dine-in covers</label><input type="number" min="0" step="1" placeholder="0" value="${d.covers||''}" oninput="upd('${b}','covers',this.value)"/></div>
    <div class="fld"><label>Total transactions</label><input type="number" min="0" step="1" placeholder="0" value="${d.transactions||''}" oninput="upd('${b}','transactions',this.value)"/></div>
  </div>

  <div class="btn-row">
    <button class="btn" onclick="clearB('${b}')">Clear</button>
    <button class="btn primary" onclick="saveB('${b}')">Save ${b}</button>
  </div>
</div>
${activeB<4?`<button class="btn primary" style="width:100%" onclick="switchB(${activeB+1})">Next: ${BRANCHES[activeB+1]} →</button>`:`<button class="btn report" style="width:100%" onclick="showView('summary')">View today's summary →</button>`}`;
}

function upd(b,f,v){session[b][f]=parseFloat(v)||0;renderEntry()}
function clearB(b){session[b]={gross:0,food:0,bev:0,retail:0,cash:0,visa:0,master:0,bank:0,discounts:0,covers:0,transactions:0,saved:false};renderEntry()}
function saveB(b){
  session[b].saved=true;
  const h=getH(),dt=today();
  if(!h[dt])h[dt]={};
  h[dt][b]={...session[b]};
  saveH(h);
  toast(b+' saved ✓');
  renderEntry();
}

function todayData(){const h=getH();return h[today()]||{}}

function renderSummary(){
  const td=todayData();
  const hasAny=BRANCHES.some(b=>td[b]&&td[b].gross>0);
  const el=document.getElementById('view-summary');
  if(!hasAny){el.innerHTML=`<div class="empty"><div>No data saved for today.</div><div style="margin-top:6px;font-size:12px">Enter figures in Daily entry and save each branch.</div></div>`;return}

  const totalG=BRANCHES.reduce((s,b)=>s+(td[b]?td[b].gross:0),0);
  const totalExV=totalG/1.05,totalVAT=totalG-totalExV;
  const totalDisc=BRANCHES.reduce((s,b)=>s+(td[b]?td[b].discounts:0),0);
  const totalCov=BRANCHES.reduce((s,b)=>s+(td[b]?td[b].covers:0),0);
  const totalTx=BRANCHES.reduce((s,b)=>s+(td[b]?td[b].transactions:0),0);
  const totalCash=BRANCHES.reduce((s,b)=>s+(td[b]?td[b].cash:0),0);
  const totalCard=BRANCHES.reduce((s,b)=>s+(td[b]?(td[b].visa||0)+(td[b].master||0):0),0);
  const totalBank=BRANCHES.reduce((s,b)=>s+(td[b]?td[b].bank:0),0);

  const rows=BRANCHES.map(b=>{
    const e=td[b]||{},g=e.gross||0,exv=g/1.05;
    const share=totalG>0?(g/totalG*100).toFixed(1):'0.0';
    return`<tr>
      <td><span class="outlet-name"><span class="bdot" style="background:${COLORS[BRANCHES.indexOf(b)]}"></span>${b}</span></td>
      <td>${fmtN(g)}</td><td>${fmtN(exv)}</td><td>${fmtN(g-exv)}</td>
      <td>${fmtN(e.discounts||0)}</td><td>${e.covers||0}</td><td>${e.transactions||0}</td><td>${share}%</td>
    </tr>`;
  }).join('');

  const bars=BRANCHES.filter(b=>td[b]&&td[b].gross>0).sort((a,z)=>(td[z].gross||0)-(td[a].gross||0)).map(b=>{
    const pct=totalG>0?((td[b].gross||0)/totalG*100):0;
    return`<div class="bar-row"><div class="bar-lbl">${b}</div><div class="bar-track"><div class="bar-fill" style="width:${pct.toFixed(1)}%;background:${COLORS[BRANCHES.indexOf(b)]}"></div></div><div class="bar-val">${fmt(td[b].gross)}</div></div>`;
  }).join('');

  el.innerHTML=`
<div class="metrics">
  <div class="metric"><div class="ml">Total gross (incl. VAT)</div><div class="mv">${fmtN(totalG)}</div><div class="ms">AED</div></div>
  <div class="metric blue"><div class="ml">Ex. VAT</div><div class="mv">${fmtN(totalExV)}</div><div class="ms">AED</div></div>
  <div class="metric amber"><div class="ml">VAT collected</div><div class="mv">${fmtN(totalVAT)}</div><div class="ms">5% UAE FTA</div></div>
  <div class="metric"><div class="ml">Total discounts</div><div class="mv">${fmtN(totalDisc)}</div><div class="ms">AED</div></div>
  <div class="metric green"><div class="ml">Covers / Transactions</div><div class="mv">${totalCov}</div><div class="ms">${totalTx} transactions</div></div>
</div>
<div class="card">
  <div class="card-header"><div class="card-title">Branch breakdown</div><div class="card-sub">${todayLbl()}</div></div>
  <div class="tbl-wrap"><table>
    <thead><tr><th>Outlet</th><th>Gross</th><th>Ex. VAT</th><th>VAT</th><th>Discounts</th><th>Covers</th><th>Txn</th><th>Share</th></tr></thead>
    <tbody>${rows}</tbody>
    <tfoot><tr><td class="outlet-name" style="font-family:'DM Sans',sans-serif">Total</td><td>${fmtN(totalG)}</td><td>${fmtN(totalExV)}</td><td>${fmtN(totalVAT)}</td><td>${fmtN(totalDisc)}</td><td>${totalCov}</td><td>${totalTx}</td><td>100%</td></tr></tfoot>
  </table></div>
</div>
<div class="card">
  <div class="card-header"><div class="card-title">Sales contribution</div></div>
  <div class="bar-section">${bars}</div>
  <div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border)">
    <div style="font-size:11px;font-weight:600;color:var(--hint);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Payment mix</div>
    <div class="pay-mix">
      <span class="pay-pill cash">Cash: ${fmt(totalCash)}</span>
      <span class="pay-pill card">Cards: ${fmt(totalCard)}</span>
      <span class="pay-pill bank">Bank transfer: ${fmt(totalBank)}</span>
    </div>
  </div>
</div>`;
}

function renderMTD(){
  const h=getH(),el=document.getElementById('view-mtd');
  const mp=today().substring(0,7);
  const days=Object.keys(h).filter(d=>d.startsWith(mp)).sort();
  if(!days.length){el.innerHTML=`<div class="empty">No data for this month yet.</div>`;return}

  const mb={};
  BRANCHES.forEach(b=>mb[b]={gross:0,food:0,bev:0,retail:0,cash:0,visa:0,master:0,bank:0,discounts:0,covers:0,transactions:0,days:0});
  days.forEach(d=>BRANCHES.forEach(b=>{if(h[d]&&h[d][b]){const e=h[d][b];['gross','food','bev','retail','cash','visa','master','bank','discounts','covers','transactions'].forEach(k=>mb[b][k]+=(e[k]||0));if(e.gross>0)mb[b].days++;}}));

  const tG=BRANCHES.reduce((s,b)=>s+mb[b].gross,0);
  const tExV=tG/1.05,tVAT=tG-tExV;
  const tDisc=BRANCHES.reduce((s,b)=>s+mb[b].discounts,0);
  const tCov=BRANCHES.reduce((s,b)=>s+mb[b].covers,0);
  const mn=new Date().toLocaleDateString('en-AE',{month:'long',year:'numeric'});

  const rows=BRANCHES.map(b=>{
    const m=mb[b],share=tG>0?(m.gross/tG*100).toFixed(1):'0.0';
    return`<tr>
      <td><span class="outlet-name"><span class="bdot" style="background:${COLORS[BRANCHES.indexOf(b)]}"></span>${b}</span></td>
      <td>${fmtN(m.gross)}</td><td>${fmtN(m.gross/1.05)}</td><td>${fmtN(m.gross-(m.gross/1.05))}</td>
      <td>${fmtN(m.discounts)}</td><td>${m.covers}</td><td>${m.days}d</td><td>${share}%</td>
    </tr>`;
  }).join('');

  const bars=BRANCHES.sort((a,z)=>mb[z].gross-mb[a].gross).map(b=>{
    const pct=tG>0?(mb[b].gross/tG*100):0;
    return`<div class="bar-row"><div class="bar-lbl">${b}</div><div class="bar-track"><div class="bar-fill" style="width:${pct.toFixed(1)}%;background:${COLORS[BRANCHES.indexOf(b)]}"></div></div><div class="bar-val">${fmt(mb[b].gross)}</div></div>`;
  }).join('');

  el.innerHTML=`
<div class="metrics">
  <div class="metric"><div class="ml">MTD gross (incl. VAT)</div><div class="mv">${fmtN(tG)}</div><div class="ms">${days.length} days recorded</div></div>
  <div class="metric blue"><div class="ml">MTD ex. VAT</div><div class="mv">${fmtN(tExV)}</div></div>
  <div class="metric amber"><div class="ml">MTD VAT</div><div class="mv">${fmtN(tVAT)}</div></div>
  <div class="metric"><div class="ml">MTD discounts</div><div class="mv">${fmtN(tDisc)}</div></div>
  <div class="metric green"><div class="ml">MTD covers</div><div class="mv">${tCov}</div></div>
</div>
<div class="card">
  <div class="card-header"><div class="card-title">MTD by branch</div><div class="card-sub">${mn}</div></div>
  <div class="tbl-wrap"><table>
    <thead><tr><th>Outlet</th><th>Gross</th><th>Ex. VAT</th><th>VAT</th><th>Discounts</th><th>Covers</th><th>Days</th><th>Share</th></tr></thead>
    <tbody>${rows}</tbody>
    <tfoot><tr><td style="font-family:'DM Sans',sans-serif;font-weight:600">Total</td><td>${fmtN(tG)}</td><td>${fmtN(tExV)}</td><td>${fmtN(tVAT)}</td><td>${fmtN(tDisc)}</td><td>${tCov}</td><td>${days.length}</td><td>100%</td></tr></tfoot>
  </table></div>
</div>
<div class="card">
  <div class="card-header"><div class="card-title">MTD contribution</div></div>
  <div class="bar-section">${bars}</div>
</div>`;
}

function renderHistory(){
  const h=getH(),el=document.getElementById('view-history');
  const days=Object.keys(h).sort().reverse().slice(0,45);
  if(!days.length){el.innerHTML=`<div class="empty">No history yet.</div>`;return}
  const rows=days.map(d=>{
    const total=BRANCHES.reduce((s,b)=>s+(h[d][b]?h[d][b].gross:0),0);
    const bcount=BRANCHES.filter(b=>h[d][b]&&h[d][b].gross>0).length;
    const lbl=new Date(d+'T12:00:00').toLocaleDateString('en-AE',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
    return`<div class="hist-row">
      <div><div class="hist-date">${lbl}</div><div class="hist-sub">${bcount} branch${bcount!==1?'es':''}</div></div>
      <div class="hist-amt"><div class="main">${fmt(total)}</div><div class="sub">${fmtN(total/1.05)} ex. VAT</div></div>
      <button class="del-btn" onclick="delDay('${d}')" title="Delete">✕</button>
    </div>`;
  }).join('');
  el.innerHTML=`<div class="card"><div class="card-header"><div class="card-title">History</div><div class="card-sub">Last 45 days</div></div>${rows}</div>`;
}

function delDay(d){const h=getH();delete h[d];saveH(h);toast('Deleted '+d);renderHistory()}

document.getElementById('datechip').textContent=todayLbl();
renderEntry();
</script>
</body>
</html>
